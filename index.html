<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мобильный заказ</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;background:#f5f5f7;font-family:-apple-system}

.wrap{max-width:420px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:28px;padding:16px}

.head{display:flex;justify-content:space-between;margin-bottom:10px}
.title{font-size:24px;font-weight:700}

.badge{padding:10px 14px;border-radius:16px;background:#eef2f7}
.badge.dark{background:#111;color:#fff;cursor:pointer}

.display{
  font-size:42px;
  text-align:center;
  margin:14px 0;
  font-family:monospace;
  letter-spacing:10px;
}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:70px;border-radius:18px;font-size:26px;border:0}
.ok{background:#111;color:#fff}

.submit{margin-top:14px;width:100%;height:56px;border-radius:18px;background:#111;color:#fff}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end}
.modal.open{display:flex}
.sheet{background:#fff;width:100%;border-radius:20px;padding:16px}

.item{display:flex;justify-content:space-between;margin:10px 0}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="head">
<div class="title">Мобильный заказ</div>
<button class="badge dark" id="openItems">Всего <b id="total">0</b></button>
</div>

<div class="display" id="display">****</div>

<div class="grid" id="grid"></div>

<div style="margin-top:10px;font-weight:600">Сумма: <span id="sum">0 ₽</span></div>

<button class="submit" id="submit">Отправить заявку</button>

</div>
</div>

<div class="modal" id="itemsModal">
  <div class="sheet">
    <h3>Позиции</h3>
    <div id="itemsList"></div>
    <button id="closeItems">Готово</button>
  </div>
</div>

<script>
let rows=[];
let current='';

const elDisplay=document.getElementById('display');
const elTotal=document.getElementById('total');
const elSum=document.getElementById('sum');

function beep(freq){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.05);
}

function sync(){
  elDisplay.textContent=(current+'****').slice(0,4);
  elTotal.textContent=rows.reduce((s,r)=>s+r.qty,0);

  let sum=0;
  rows.forEach(r=>sum+=r.qty*0);
  elSum.textContent=sum+' ₽';

  renderItems();
}

function addDigit(d){
  if(current.length<4){current+=d; sync();}
}

function addCode(){
  beep(800);
  if(current.length!==4)return;

  const f=rows.find(r=>r.code===current);
  if(f) f.qty++;
  else rows.push({code:current,qty:1});

  current='';
  sync();
}

function renderItems(){
  const el=document.getElementById('itemsList');
  el.innerHTML='';
  rows.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`
      ${r.code}
      <div>
        <button onclick="change(${i},-1)">-</button>
        ${r.qty}
        <button onclick="change(${i},1)">+</button>
      </div>`;
    el.appendChild(div);
  });
}

function change(i,d){
  beep(d>0?900:500);
  rows[i].qty+=d;
  if(rows[i].qty<=0) rows.splice(i,1);
  sync();
}

async function send(){
  if(!rows.length) return alert('Добавь товар');

  const text = rows.map(r=>`${r.code} - ${r.qty}`).join('\\n');

  await fetch('/.netlify/functions/send',{
    method:'POST',
    body:JSON.stringify({text})
  });

  alert('Отправлено');
  rows=[];
  sync();
}

['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k=>{
  const b=document.createElement('button');
  b.className='key'+(k==='ok'?' ok':'');
  b.textContent=k==='del'?'⌫':k==='ok'?'OK':k;
  b.onclick=()=>{
    if(k==='del') current=current.slice(0,-1);
    else if(k==='ok') addCode();
    else addDigit(k);
    sync();
  };
  document.getElementById('grid').appendChild(b);
});

document.getElementById('submit').onclick=send;
document.getElementById('openItems').onclick=()=>document.getElementById('itemsModal').classList.add('open');
document.getElementById('closeItems').onclick=()=>document.getElementById('itemsModal').classList.remove('open');

sync();
</script>

</body>
</html>
