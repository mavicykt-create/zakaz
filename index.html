<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мобильный заказ</title>
<style>
  :root{
    --bg:#f5f5f7;
    --card:rgba(255,255,255,.84);
    --card-solid:#ffffff;
    --ink:#111827;
    --muted:#6b7280;
    --line:#e5e7eb;
    --primary:#111827;
    --primary-2:#1f2937;
    --blue:#2563eb;
    --green:#16a34a;
    --red:#dc2626;
    --success-bg:#ecfdf5;
    --success:#047857;
    --shadow-lg:0 24px 60px rgba(17,24,39,.10);
    --shadow-md:0 10px 26px rgba(17,24,39,.06);
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.96) 0%, rgba(245,245,247,1) 45%),
      var(--bg);
  }

  body{
    overscroll-behavior:none;
  }

  .wrap{
    max-width:460px;
    margin:0 auto;
    padding:12px 12px 24px;
  }

  .card{
    min-height:calc(100vh - 24px);
    padding:18px;
    border-radius:34px;
    background:var(--card);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.72);
    box-shadow:var(--shadow-lg);
  }

  .head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:16px;
  }

  .title{
    font-size:28px;
    line-height:1.02;
    font-weight:800;
    letter-spacing:-0.05em;
    margin:2px 0 0;
  }

  .badges{
    display:flex;
    gap:8px;
    align-items:flex-start;
  }

  .badge{
    min-width:78px;
    padding:10px 12px;
    border-radius:18px;
    border:0;
    background:#eef2f7;
    color:#475569;
    text-align:center;
    font-size:13px;
    font-weight:600;
    line-height:1.05;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
  }

  .badge b{
    display:block;
    margin-top:4px;
    font-size:18px;
    color:var(--ink);
  }

  .badge.dark{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#dbeafe;
    cursor:pointer;
    box-shadow:0 14px 28px rgba(17,24,39,.16);
  }

  .badge.dark b{
    color:#fff;
  }

  .panel{
    padding:16px;
    border-radius:28px;
    background:rgba(255,255,255,.90);
    border:1px solid var(--line);
    box-shadow:var(--shadow-md);
    margin-bottom:14px;
    transition:.18s ease;
  }

  .preview{
    min-height:70px;
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px;
    align-items:center;
  }

  .preview-code{
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.04em;
    color:var(--ink);
  }

  .preview-empty{
    color:#9ca3af;
  }

  .preview-qty{
    min-width:28px;
    text-align:center;
    font-size:20px;
    font-weight:700;
  }

  .actions{
    display:flex;
    gap:8px;
  }

  .icon-btn{
    width:40px;
    height:40px;
    border:0;
    border-radius:14px;
    cursor:pointer;
    font-size:20px;
    font-weight:800;
    box-shadow:0 10px 20px rgba(17,24,39,.08);
  }

  .minus{
    background:#fff;
    color:var(--red);
    border:1px solid #fecaca;
  }

  .plus{
    background:#eefbf3;
    color:var(--green);
    border:1px solid #bbf7d0;
  }

  .display{
    position:relative;
    margin-bottom:14px;
    padding:22px 16px;
    border-radius:30px;
    border:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff 0%, #f8fafc 100%);
    text-align:center;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:44px;
    font-weight:700;
    letter-spacing:.22em;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    transition:.18s ease;
    overflow:hidden;
  }

  .display.auto-ok::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    height:3px;
    width:100%;
    background:linear-gradient(90deg,#93c5fd 0%,#2563eb 100%);
    transform-origin:left center;
    animation:autoOkLine 1.5s linear forwards;
  }

  @keyframes autoOkLine{
    from{transform:scaleX(0)}
    to{transform:scaleX(1)}
  }

  .display.invalid{
    border-color:#fecaca;
    background:linear-gradient(180deg,#fff5f5 0%,#ffecec 100%);
    color:#dc2626;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 0 0 3px rgba(220,38,38,.08);
  }

  .panel.invalid{
    border-color:#fecaca;
    background:#fff5f5;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:14px;
  }

  .key{
    height:72px;
    border-radius:24px;
    border:1px solid #dbe2ea;
    background:linear-gradient(180deg,#ffffff 0%,#f7f8fa 100%);
    color:var(--blue);
    font-size:28px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
    transition:.16s ease;
  }

  .key.ok{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    border-color:var(--primary);
    font-size:24px;
  }

  .key.ok.dimmed{
    opacity:.45;
  }

  .meta{
    display:flex;
    justify-content:space-between;
    gap:12px;
    margin:4px 2px 14px;
    color:var(--muted);
    font-size:14px;
    font-weight:600;
  }

  .meta small{
    display:block;
    margin-bottom:4px;
    color:#9ca3af;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  .meta strong{
    color:var(--ink);
    font-size:15px;
  }

  .toolbar{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
  }

  .submit{
    min-height:58px;
    border:0;
    border-radius:24px;
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    font-size:19px;
    font-weight:800;
    letter-spacing:-0.02em;
    cursor:pointer;
    box-shadow:0 16px 32px rgba(17,24,39,.18);
  }

  .comment-btn{
    min-width:64px;
    min-height:58px;
    padding:0 18px;
    border-radius:24px;
    border:1px solid #dbe2ea;
    background:#fff;
    color:var(--ink);
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
  }

  .feedstatus{
    margin-top:-4px;
    margin-bottom:12px;
    color:#6b7280;
    font-size:13px;
    font-weight:500;
  }

  .msg{
    display:none;
    margin-top:12px;
    padding:14px 16px;
    border-radius:20px;
    background:var(--success-bg);
    color:var(--success);
    font-size:15px;
    font-weight:700;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    padding:14px;
    background:rgba(15,23,42,.36);
  }

  .modal.open{
    display:flex;
  }

  .sheet{
    width:100%;
    max-width:440px;
    max-height:78vh;
    overflow:auto;
    padding:18px;
    border-radius:30px 30px 22px 22px;
    background:var(--card-solid);
    box-shadow:0 24px 64px rgba(15,23,42,.26);
  }

  .sheet-handle{
    width:42px;
    height:5px;
    margin:0 auto 14px;
    border-radius:999px;
    background:#d1d5db;
  }

  .sheet-title{
    margin:0 0 12px;
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.04em;
  }

  .comment{
    width:100%;
    min-height:140px;
    padding:16px;
    border-radius:22px;
    border:1px solid var(--line);
    background:#fbfcfd;
    font:inherit;
    font-size:17px;
    color:var(--ink);
    resize:none;
    outline:none;
  }

  .sheet-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:14px;
  }

  .sheet-btn{
    min-height:54px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }

  .sheet-btn.primary{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    border-color:var(--primary);
  }

  .items-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .item-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px;
    align-items:center;
    padding:12px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fbfcfd;
  }

  .item-row-code{
    font-size:20px;
    font-weight:700;
  }

  .item-row-sub{
    margin-top:4px;
    color:#6b7280;
    font-size:13px;
    font-weight:500;
  }

  .item-row-qty{
    min-width:28px;
    text-align:center;
    font-size:18px;
    font-weight:700;
  }

  .item-row-actions{
    display:flex;
    gap:8px;
  }

  .item-row-btn{
    width:38px;
    height:38px;
    border:0;
    border-radius:12px;
    cursor:pointer;
    font-size:20px;
    font-weight:800;
    box-shadow:0 8px 18px rgba(15,23,42,.08);
  }

  .items-empty{
    padding:18px;
    border-radius:18px;
    border:1px dashed #d1d5db;
    color:#6b7280;
    text-align:center;
    font-size:15px;
    font-weight:600;
  }

  .badge.dark:active,.icon-btn:active,.key:active,.submit:active,.comment-btn:active,.sheet-btn:active,.item-row-btn:active{
    transform:scale(.97);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="title">Мобильный заказ</div>
      <div class="badges">
        <div class="badge">Позиций<b id="positions">0</b></div>
        <button type="button" class="badge dark" id="openItems">Всего<b id="total">0</b></button>
      </div>
    </div>

    <div class="panel preview" id="previewPanel">
      <div class="preview-code preview-empty" id="previewCode"></div>
      <div class="preview-qty" id="previewQty"></div>
      <div class="actions" id="previewActions" style="display:none;">
        <button type="button" class="icon-btn minus" id="minus">−</button>
        <button type="button" class="icon-btn plus" id="plus">+</button>
      </div>
    </div>

    <div class="display" id="display">****</div>
    <div class="grid" id="grid"></div>

    <div class="meta">
      <div>
        <small>Комментарий</small>
        <strong id="commentState">нет</strong>
      </div>
      <div style="text-align:right">
        <small>Сумма</small>
        <strong id="sum">0 ₽</strong>
      </div>
    </div>

    <div class="feedstatus" id="feedStatus">Загрузка цен…</div>

    <div class="toolbar">
      <button type="button" class="submit" id="submit">Отправить заявку</button>
      <button type="button" class="comment-btn" id="openComment">💬</button>
    </div>

    <div class="msg" id="message">Заявка отправлена. Спасибо за заказ!</div>
  </div>
</div>

<div class="modal" id="commentModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Комментарий к заказу</h3>
    <textarea id="comment" class="comment" placeholder="Напишите комментарий к заказу..."></textarea>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn" id="closeComment">Отмена</button>
      <button type="button" class="sheet-btn primary" id="saveComment">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal" id="itemsModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Позиции заказа</h3>
    <div class="items-list" id="itemsList"></div>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn primary" id="closeItems">Готово</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });

let rows = [];
let current = '';
let PRODUCTS = {};
let autoAddTimer = null;
let invalidTimer = null;

const elDisplay = document.getElementById('display');
const elPositions = document.getElementById('positions');
const elTotal = document.getElementById('total');
const elPreviewCode = document.getElementById('previewCode');
const elPreviewQty = document.getElementById('previewQty');
const elPreviewActions = document.getElementById('previewActions');
const elPreviewPanel = document.getElementById('previewPanel');
const elSum = document.getElementById('sum');
const elMsg = document.getElementById('message');
const elFeedStatus = document.getElementById('feedStatus');
const elComment = document.getElementById('comment');
const elCommentState = document.getElementById('commentState');

function beep(freq){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = freq;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.05);
  }catch(e){}
}

async function loadPrices(){
  try{
    const res = await fetch('/.netlify/functions/products');
    if(!res.ok) throw new Error('feed');
    PRODUCTS = await res.json();
    elFeedStatus.textContent = 'Цены загружены';
    sync();
  }catch(e){
    elFeedStatus.textContent = 'Цены не загружены';
  }
}

function getPrice(code){
  const p = PRODUCTS[code];
  return p ? Number(p.price || 0) : 0;
}

function hasProduct(code){
  return !!PRODUCTS[code];
}

function clearAutoAdd(){
  if(autoAddTimer){
    clearTimeout(autoAddTimer);
    autoAddTimer = null;
  }
  elDisplay.classList.remove('auto-ok');
  document.querySelector('.key.ok')?.classList.remove('dimmed');
}

function showInvalidCode(){
  clearTimeout(invalidTimer);
  clearAutoAdd();

  elDisplay.classList.add('invalid');
  elPreviewPanel.classList.add('invalid');

  invalidTimer = setTimeout(()=>{
    current = '';
    elDisplay.classList.remove('invalid');
    elPreviewPanel.classList.remove('invalid');
    sync();
  }, 900);
}

function scheduleAutoAdd(){
  clearAutoAdd();
  if(current.length !== 4) return;

  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');

  elDisplay.classList.add('auto-ok');
  document.querySelector('.key.ok')?.classList.add('dimmed');

  autoAddTimer = setTimeout(()=>{
    addCode(true);
  }, 1500);
}

function renderItems(){
  const el = document.getElementById('itemsList');
  el.innerHTML = '';

  if(!rows.length){
    el.innerHTML = '<div class="items-empty">Пока нет добавленных артикулов</div>';
    return;
  }

  rows.forEach((r,i)=>{
    const price = getPrice(r.code);
    const lineSum = price * r.qty;

    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML =
      '<div>' +
        '<div class="item-row-code">' + r.code + '</div>' +
        '<div class="item-row-sub">' + price.toLocaleString('ru-RU') + ' ₽ × ' + r.qty + ' = ' + lineSum.toLocaleString('ru-RU') + ' ₽</div>' +
      '</div>' +
      '<div class="item-row-qty">' + r.qty + '</div>' +
      '<div class="item-row-actions">' +
        '<button type="button" class="item-row-btn minus" data-index="' + i + '" data-delta="-1">−</button>' +
        '<button type="button" class="item-row-btn plus" data-index="' + i + '" data-delta="1">+</button>' +
      '</div>';
    el.appendChild(div);
  });
}

function sync(){
  elDisplay.textContent = (current + '****').slice(0,4);
  elPositions.textContent = String(rows.length);
  elTotal.textContent = String(rows.reduce((s,r)=>s+r.qty,0));

  if(rows.length){
    const last = rows[rows.length - 1];
    elPreviewCode.textContent = last.code;
    elPreviewQty.textContent = last.qty;
    elPreviewActions.style.display = 'flex';
  }else{
    elPreviewCode.textContent = '';
    elPreviewQty.textContent = '';
    elPreviewActions.style.display = 'none';
  }

  let sum = 0;
  rows.forEach(r => sum += r.qty * getPrice(r.code));
  elSum.textContent = sum.toLocaleString('ru-RU') + ' ₽';
  elCommentState.textContent = (elComment.value || '').trim() ? 'добавлен' : 'нет';

  renderItems();

  if(current.length === 4){
    scheduleAutoAdd();
  }else{
    clearAutoAdd();
  }
}

function addDigit(d){
  elMsg.style.display = 'none';
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');

  if(current.length < 4){
    current += d;
    sync();
  }
}

function deleteLast(){
  clearAutoAdd();
  current = current.slice(0,-1);
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');
  sync();
}

function addCode(isAuto){
  clearAutoAdd();

  if(current.length !== 4) return;

  const code = current;

  if(!hasProduct(code)){
    beep(420);
    showInvalidCode();
    return;
  }

  beep(isAuto ? 760 : 820);

  const found = rows.find(r => r.code === code);
  if(found) found.qty += 1;
  else rows.push({code: code, qty: 1});

  current = '';
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');
  sync();
}

function changeIndex(index,delta){
  if(index < 0 || index >= rows.length) return;
  beep(delta > 0 ? 940 : 540);
  rows[index].qty += delta;
  if(rows[index].qty <= 0) rows.splice(index,1);
  sync();
}

async function send(){
  if(!rows.length) return alert('Добавь товар');

  const lines = rows.map(r => r.code + '\\t' + r.qty);
  const comment = (elComment.value || '').trim();

  let fullText = lines.join('\\n');

  if(comment){
    fullText += '\\n\\nКомментарий: ' + comment;
  }

  const res = await fetch('/.netlify/functions/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text: fullText })
  });

  if(!res.ok){
    alert('Не удалось отправить заявку');
    return;
  }

  elMsg.style.display = 'block';
  rows = [];
  current = '';
  elComment.value = '';
  sync();
}

['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k=>{
  const b = document.createElement('button');
  b.className = 'key' + (k === 'ok' ? ' ok' : '');
  b.textContent = k === 'del' ? '⌫' : k === 'ok' ? 'OK' : k;
  b.onclick = ()=>{
    if(k === 'del') deleteLast();
    else if(k === 'ok') addCode(false);
    else addDigit(k);
  };
  document.getElementById('grid').appendChild(b);
});

document.getElementById('minus').onclick = ()=>{ if(rows.length) changeIndex(rows.length - 1,-1); };
document.getElementById('plus').onclick = ()=>{ if(rows.length) changeIndex(rows.length - 1,1); };

document.getElementById('submit').onclick = send;

document.getElementById('openItems').onclick = ()=>document.getElementById('itemsModal').classList.add('open');
document.getElementById('closeItems').onclick = ()=>document.getElementById('itemsModal').classList.remove('open');

document.getElementById('openComment').onclick = ()=>{
  document.getElementById('commentModal').classList.add('open');
  setTimeout(()=>elComment.focus(),50);
};
document.getElementById('closeComment').onclick = ()=>document.getElementById('commentModal').classList.remove('open');
document.getElementById('saveComment').onclick = ()=>{
  document.getElementById('commentModal').classList.remove('open');
  sync();
};

document.getElementById('itemsList').addEventListener('click', function(e){
  const btn = e.target.closest('[data-index]');
  if(!btn) return;
  changeIndex(Number(btn.dataset.index), Number(btn.dataset.delta));
});

loadPrices();
sync();
</script>
</body>
</html>
