<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Сладкая планета</title>
<meta name="application-name" content="Сладкая планета" />
<meta name="apple-mobile-web-app-title" content="Сладкая планета" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffffff" />
<link rel="manifest" href="/manifest.json" />
<style>
  :root{
    --bg:#f5f5f7;
    --card:rgba(255,255,255,.84);
    --card-solid:#ffffff;
    --ink:#111827;
    --muted:#6b7280;
    --line:#e5e7eb;
    --primary:#111827;
    --primary-2:#1f2937;
    --blue:#2563eb;
    --green:#16a34a;
    --red:#dc2626;
    --red-2:#991b1b;
    --yellow:#ca8a04;
    --success-bg:#ecfdf5;
    --success:#047857;
    --shadow-lg:0 24px 60px rgba(17,24,39,.10);
    --shadow-md:0 10px 26px rgba(17,24,39,.06);
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.96) 0%, rgba(245,245,247,1) 45%),
      var(--bg);
  }

  body{
    overscroll-behavior:none;
  }

  .wrap{
    max-width:460px;
    margin:0 auto;
    padding:12px 12px 24px;
  }

  .card{
    min-height:calc(100vh - 24px);
    padding:18px;
    border-radius:34px;
    background:var(--card);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.72);
    box-shadow:var(--shadow-lg);
  }

  .head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:16px;
  }

  .title{
    font-size:28px;
    line-height:1.02;
    font-weight:800;
    letter-spacing:-0.05em;
    margin:2px 0 0;
  }

  .badges{
    display:flex;
    gap:8px;
    align-items:flex-start;
  }

  .badge{
    min-width:78px;
    padding:10px 12px;
    border-radius:18px;
    border:0;
    background:#eef2f7;
    color:#475569;
    text-align:center;
    font-size:13px;
    font-weight:600;
    line-height:1.05;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
  }

  .badge b{
    display:block;
    margin-top:4px;
    font-size:18px;
    color:var(--ink);
  }

  .badge.dark{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#dbeafe;
    cursor:pointer;
    box-shadow:0 14px 28px rgba(17,24,39,.16);
  }

  .badge.dark b{ color:#fff; }

  .panel{
    padding:14px 16px;
    border-radius:28px;
    background:rgba(255,255,255,.90);
    border:1px solid var(--line);
    box-shadow:var(--shadow-md);
    margin-bottom:14px;
    transition:.18s ease;
  }

  .preview{
    min-height:82px;
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px;
    align-items:center;
  }

  .preview-main{
    min-width:0;
  }

  .preview-code{
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.04em;
    color:var(--ink);
    min-height:1.2em;
    line-height:1.1;
  }

  .preview-name{
    margin-top:6px;
    min-height:1.2em;
    color:#6b7280;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .preview-empty{ color:#9ca3af; }

  .preview-qty{
    min-width:28px;
    text-align:center;
    font-size:20px;
    font-weight:700;
  }

  .actions{
    display:flex;
    gap:8px;
  }

  .icon-btn{
    width:40px;
    height:40px;
    border:0;
    border-radius:14px;
    cursor:pointer;
    font-size:20px;
    font-weight:800;
    box-shadow:0 10px 20px rgba(17,24,39,.08);
  }

  .minus{
    background:#fff;
    color:var(--red);
    border:1px solid #fecaca;
  }

  .plus{
    background:#eefbf3;
    color:var(--green);
    border:1px solid #bbf7d0;
  }

  .display{
    position:relative;
    margin-bottom:14px;
    padding:22px 16px;
    border-radius:30px;
    border:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff 0%, #f8fafc 100%);
    text-align:center;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:44px;
    font-weight:700;
    letter-spacing:.22em;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    transition:.18s ease;
    overflow:hidden;
  }

  .display.auto-ok::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    height:3px;
    width:100%;
    background:linear-gradient(90deg,#93c5fd 0%,#2563eb 100%);
    transform-origin:left center;
    animation:autoOkLine 1s linear forwards;
  }

  @keyframes autoOkLine{
    from{transform:scaleX(0)}
    to{transform:scaleX(1)}
  }

  .display.invalid{
    border-color:#ef4444;
    background:linear-gradient(180deg,#fff1f2 0%,#ffe4e6 100%);
    color:#b91c1c;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      0 0 0 4px rgba(239,68,68,.15),
      0 0 20px rgba(239,68,68,.20);
    animation:errorShake .24s linear 1;
  }

  .panel.invalid{
    border-color:#ef4444;
    background:#fff1f2;
    box-shadow:
      0 0 0 4px rgba(239,68,68,.12),
      0 10px 26px rgba(185,28,28,.10);
  }

  @keyframes errorShake{
    0%{transform:translateX(0)}
    20%{transform:translateX(-4px)}
    40%{transform:translateX(4px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
    100%{transform:translateX(0)}
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:14px;
  }

  .key{
    height:72px;
    border-radius:24px;
    border:1px solid #dbe2ea;
    background:linear-gradient(180deg,#ffffff 0%,#f7f8fa 100%);
    color:var(--blue);
    font-size:28px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
    transition:.16s ease;
  }

  .key.ok{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    border-color:var(--primary);
    font-size:24px;
  }

  .key.ok.dimmed{ opacity:.45; }

  .meta{
    display:flex;
    justify-content:space-between;
    gap:12px;
    margin:4px 2px 14px;
    color:var(--muted);
    font-size:14px;
    font-weight:600;
  }

  .meta small{
    display:block;
    margin-bottom:4px;
    color:#9ca3af;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  .meta strong{
    color:var(--ink);
    font-size:15px;
  }

  .toolbar{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
  }

  .submit{
    min-height:58px;
    border:0;
    border-radius:24px;
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    font-size:19px;
    font-weight:800;
    letter-spacing:-0.02em;
    cursor:pointer;
    box-shadow:0 16px 32px rgba(17,24,39,.18);
  }

  .submit:disabled{ opacity:.65; cursor:not-allowed; }

  .comment-btn{
    min-width:64px;
    min-height:58px;
    padding:0 18px;
    border-radius:24px;
    border:1px solid #dbe2ea;
    background:#fff;
    color:var(--ink);
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
  }

  .feedstatus{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:-4px;
    margin-bottom:12px;
    color:#6b7280;
    font-size:13px;
    font-weight:700;
  }

  .feed-dot{
    width:12px;
    height:12px;
    border-radius:50%;
    flex:0 0 12px;
    background:#ef4444;
    box-shadow:0 0 0 3px rgba(239,68,68,.12);
  }

  .feed-dot.loading{
    background:#facc15;
    box-shadow:0 0 0 3px rgba(250,204,21,.16);
    animation:blinkLoading .9s infinite;
  }

  .feed-dot.ready{
    background:#22c55e;
    box-shadow:0 0 0 3px rgba(34,197,94,.14);
    animation:none;
  }

  @keyframes blinkLoading{
    0%,100%{opacity:1}
    50%{opacity:.35}
  }

  .msg{
    display:none;
    margin-top:12px;
    padding:16px 18px;
    border-radius:20px;
    background:var(--success-bg);
    color:var(--success);
    font-size:15px;
    font-weight:700;
    line-height:1.45;
    box-shadow:0 10px 24px rgba(4,120,87,.08);
  }

  .msg strong{
    font-size:16px;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    padding:14px;
    background:rgba(15,23,42,.36);
    z-index:1000;
  }

  .modal.open{ display:flex; }

  .sheet{
    width:100%;
    max-width:440px;
    max-height:78vh;
    overflow:auto;
    padding:18px;
    border-radius:30px 30px 22px 22px;
    background:var(--card-solid);
    box-shadow:0 24px 64px rgba(15,23,42,.26);
  }

  .sheet-handle{
    width:42px;
    height:5px;
    margin:0 auto 14px;
    border-radius:999px;
    background:#d1d5db;
  }

  .sheet-title{
    margin:0 0 12px;
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.04em;
  }

  .comment{
    width:100%;
    min-height:140px;
    padding:16px;
    border-radius:22px;
    border:1px solid var(--line);
    background:#fbfcfd;
    font:inherit;
    font-size:17px;
    color:var(--ink);
    resize:none;
    outline:none;
  }

  .sheet-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:14px;
  }

  .sheet-btn{
    min-height:54px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }

  .sheet-btn.primary{
    background:linear-gradient(180deg,var(--primary-2) 0%, var(--primary) 100%);
    color:#fff;
    border-color:var(--primary);
  }

  .sheet-btn.danger{
    background:#fff1f2;
    color:#b91c1c;
    border-color:#fecdd3;
  }

  .items-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .item-row{
    display:grid;
    grid-template-columns:52px minmax(0,1fr) auto auto;
    gap:10px;
    align-items:center;
    padding:12px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fbfcfd;
  }

  .item-thumb{
    width:52px;
    height:52px;
    border-radius:14px;
    background:#fff;
    border:1px solid #e5e7eb;
    object-fit:cover;
  }

  .item-thumb.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#9ca3af;
    font-size:11px;
    font-weight:700;
    background:#f8fafc;
  }

  .item-row-code{
    font-size:20px;
    font-weight:700;
  }

  .item-row-sub{
    margin-top:4px;
    color:#6b7280;
    font-size:13px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }

  .item-row-qty{
    min-width:28px;
    text-align:center;
    font-size:18px;
    font-weight:700;
  }

  .item-row-actions{
    display:flex;
    gap:8px;
  }

  .item-row-btn{
    width:38px;
    height:38px;
    border:0;
    border-radius:12px;
    cursor:pointer;
    font-size:20px;
    font-weight:800;
    box-shadow:0 8px 18px rgba(15,23,42,.08);
  }

  .items-empty{
    padding:18px;
    border-radius:18px;
    border:1px dashed #d1d5db;
    color:#6b7280;
    text-align:center;
    font-size:15px;
    font-weight:600;
  }

  .badge.dark:active,.icon-btn:active,.key:active,.submit:active,.comment-btn:active,.sheet-btn:active,.item-row-btn:active{
    transform:scale(.97);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="title">Мобильный заказ</div>
      <div class="badges">
        <div class="badge">Позиций<b id="positions">0</b></div>
        <button type="button" class="badge dark" id="openItems">Корзина<b id="total">0</b></button>
      </div>
    </div>

    <div class="panel preview" id="previewPanel">
      <div class="preview-main">
        <div class="preview-code preview-empty" id="previewCode"></div>
        <div class="preview-name" id="previewName"></div>
      </div>
      <div class="preview-qty" id="previewQty"></div>
      <div class="actions" id="previewActions" style="display:none;">
        <button type="button" class="icon-btn minus" id="minus">−</button>
        <button type="button" class="icon-btn plus" id="plus">+</button>
      </div>
    </div>

    <div class="display" id="display">****</div>
    <div class="grid" id="grid"></div>

    <div class="meta">
      <div>
        <small>Комментарий</small>
        <strong id="commentState">нет</strong>
      </div>
      <div style="text-align:right">
        <small>Сумма</small>
        <strong id="sum">0 ₽</strong>
      </div>
    </div>

    <div class="feedstatus" id="feedStatus">
      <span class="feed-dot" id="feedDot"></span>
      <span id="feedStatusText">Готовность терминала: не готов</span>
    </div>

    <div class="toolbar">
      <button type="button" class="submit" id="submit">Отправить заявку</button>
      <button type="button" class="comment-btn" id="openComment">💬</button>
      <button type="button" class="comment-btn" onclick="subscribePush()">🔔</button>
    </div>

    <div class="msg" id="message"></div>
  </div>
</div>

<div class="modal" id="commentModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Комментарий к заказу</h3>
    <textarea id="comment" class="comment" placeholder="Напишите комментарий к заказу..."></textarea>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn" id="closeComment">Отмена</button>
      <button type="button" class="sheet-btn primary" id="saveComment">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal" id="itemsModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Позиции заказа</h3>

    <div style="margin-bottom:14px;">
      <button type="button" class="sheet-btn danger" id="clearCartBtn" style="width:100%;">Очистить корзину</button>
    </div>

    <div class="items-list" id="itemsList"></div>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn primary" id="closeItems">Готово</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });

let rows = [];
let current = '';
let PRODUCTS = {};
let autoAddTimer = null;
let invalidTimer = null;
let isSending = false;
let feedLoaded = false;

const elDisplay = document.getElementById('display');
const elPositions = document.getElementById('positions');
const elTotal = document.getElementById('total');
const elPreviewCode = document.getElementById('previewCode');
const elPreviewName = document.getElementById('previewName');
const elPreviewQty = document.getElementById('previewQty');
const elPreviewActions = document.getElementById('previewActions');
const elPreviewPanel = document.getElementById('previewPanel');
const elSum = document.getElementById('sum');
const elMsg = document.getElementById('message');
const elComment = document.getElementById('comment');
const elCommentState = document.getElementById('commentState');
const elSubmit = document.getElementById('submit');
const elFeedDot = document.getElementById('feedDot');
const elFeedStatusText = document.getElementById('feedStatusText');
const okKeySelector = '.key.ok';

function beepSuccess(freq){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = freq;
    o.type = 'sine';
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);
    o.start();
    o.stop(ctx.currentTime + 0.06);
  }catch(e){}
}

function beepError(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    const o1 = ctx.createOscillator();
    const g1 = ctx.createGain();
    o1.type = 'square';
    o1.frequency.setValueAtTime(300, now);
    o1.frequency.linearRampToValueAtTime(180, now + 0.16);
    g1.gain.setValueAtTime(0.0001, now);
    g1.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
    g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    o1.connect(g1);
    g1.connect(ctx.destination);
    o1.start(now);
    o1.stop(now + 0.18);

    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'square';
    o2.frequency.setValueAtTime(220, now + 0.10);
    o2.frequency.linearRampToValueAtTime(140, now + 0.30);
    g2.gain.setValueAtTime(0.0001, now + 0.10);
    g2.gain.exponentialRampToValueAtTime(0.07, now + 0.11);
    g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    o2.connect(g2);
    g2.connect(ctx.destination);
    o2.start(now + 0.10);
    o2.stop(now + 0.32);
  }catch(e){}
}

function setFeedState(state, text){
  elFeedDot.className = 'feed-dot';
  if (state === 'loading') elFeedDot.classList.add('loading');
  if (state === 'ready') elFeedDot.classList.add('ready');
  elFeedStatusText.textContent = text;
}

async function preloadImages(products){
  const list = Object.values(products)
    .map(p => p && p.image ? p.image : '')
    .filter(Boolean)
    .slice(0, 30);

  for (const src of list){
    const img = new Image();
    img.src = src;
  }
}

async function loadPrices(){
  try{
    setFeedState('loading', 'Готовность терминала: загрузка...');
    const res = await fetch('/api/products', { cache: 'no-store' });
    if(!res.ok) throw new Error('feed');
    PRODUCTS = await res.json();
    feedLoaded = true;
    setFeedState('ready', 'Готовность терминала: готов');
    preloadImages(PRODUCTS);
    sync();
  }catch(e){
    feedLoaded = false;
    PRODUCTS = {};
    setFeedState('error', 'Готовность терминала: не готов');
  }
}

function getProduct(code){
  return PRODUCTS[code] || null;
}

function getPrice(code){
  const p = getProduct(code);
  return p ? Number(p.price || 0) : 0;
}

function getDescription(code){
  const p = getProduct(code);
  return p && p.description ? p.description : '';
}

function getImage(code){
  const p = getProduct(code);
  return p && p.image ? p.image : '';
}

function hasProduct(code){
  return !!PRODUCTS[code];
}

function clearAutoAdd(){
  if(autoAddTimer){
    clearTimeout(autoAddTimer);
    autoAddTimer = null;
  }
  elDisplay.classList.remove('auto-ok');
  document.querySelector(okKeySelector)?.classList.remove('dimmed');
}

function showInvalidCode(){
  clearTimeout(invalidTimer);
  clearAutoAdd();

  elDisplay.classList.add('invalid');
  elPreviewPanel.classList.add('invalid');

  invalidTimer = setTimeout(()=>{
    current = '';
    elDisplay.classList.remove('invalid');
    elPreviewPanel.classList.remove('invalid');
    sync();
  }, 1100);
}

function scheduleAutoAdd(){
  clearAutoAdd();
  if(current.length !== 4) return;

  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');

  elDisplay.classList.add('auto-ok');
  document.querySelector(okKeySelector)?.classList.add('dimmed');

  autoAddTimer = setTimeout(()=>{
    addCode(true);
  }, 1000);
}

function escapeHtml(value){
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function getOrderRowsForApi(){
  return rows.map(r => ({
    article: r.code,
    quantity: r.qty
  }));
}

function renderItems(){
  const el = document.getElementById('itemsList');
  el.innerHTML = '';

  if(!rows.length){
    el.innerHTML = '<div class="items-empty">Пока нет добавленных артикулов</div>';
    return;
  }

  rows.forEach((r,i)=>{
    const price = getPrice(r.code);
    const lineSum = price * r.qty;
    const desc = getDescription(r.code);
    const image = getImage(r.code);

    const thumbHtml = image
      ? `<img class="item-thumb" src="${escapeHtml(image)}" alt="">`
      : `<div class="item-thumb placeholder">нет фото</div>`;

    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML =
      thumbHtml +
      '<div>' +
        '<div class="item-row-code">' + escapeHtml(r.code) + '</div>' +
        (desc ? '<div class="item-row-sub" title="' + escapeHtml(desc) + '">' + escapeHtml(desc) + '</div>' : '') +
        '<div class="item-row-sub">' + price.toLocaleString('ru-RU') + ' ₽ × ' + r.qty + ' = ' + lineSum.toLocaleString('ru-RU') + ' ₽</div>' +
      '</div>' +
      '<div class="item-row-qty">' + r.qty + '</div>' +
      '<div class="item-row-actions">' +
        '<button type="button" class="item-row-btn minus" data-index="' + i + '" data-delta="-1">−</button>' +
        '<button type="button" class="item-row-btn plus" data-index="' + i + '" data-delta="1">+</button>' +
      '</div>';
    el.appendChild(div);
  });
}

function sync(){
  elDisplay.textContent = (current + '****').slice(0,4);
  elPositions.textContent = String(rows.length);
  elTotal.textContent = String(rows.reduce((s,r)=>s+r.qty,0));

  if(rows.length){
    const last = rows[rows.length - 1];
    elPreviewCode.textContent = last.code;
    elPreviewCode.classList.remove('preview-empty');
    elPreviewQty.textContent = last.qty;
    elPreviewName.textContent = getDescription(last.code) || '';
    elPreviewActions.style.display = 'flex';
  }else{
    elPreviewCode.textContent = '';
    elPreviewCode.classList.add('preview-empty');
    elPreviewQty.textContent = '';
    elPreviewName.textContent = '';
    elPreviewActions.style.display = 'none';
  }

  let sum = 0;
  rows.forEach(r => sum += r.qty * getPrice(r.code));
  elSum.textContent = sum.toLocaleString('ru-RU') + ' ₽';
  elCommentState.textContent = (elComment.value || '').trim() ? 'добавлен' : 'нет';

  renderItems();

  if(current.length === 4){
    scheduleAutoAdd();
  }else{
    clearAutoAdd();
  }
}

function addDigit(d){
  elMsg.style.display = 'none';
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');

  if(current.length < 4){
    current += d;
    sync();
  }
}

function deleteLast(){
  clearAutoAdd();
  current = current.slice(0,-1);
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');
  sync();
}

function addCode(isAuto){
  clearAutoAdd();

  if(current.length !== 4) return;

  const code = current;

  if(!hasProduct(code)){
    beepError();
    showInvalidCode();
    return;
  }

  beepSuccess(isAuto ? 760 : 820);

  const found = rows.find(r => r.code === code);
  if(found) found.qty += 1;
  else rows.push({code: code, qty: 1});

  current = '';
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');
  sync();
}

function changeIndex(index,delta){
  if(index < 0 || index >= rows.length) return;
  beepSuccess(delta > 0 ? 940 : 540);
  rows[index].qty += delta;
  if(rows[index].qty <= 0) rows.splice(index,1);
  sync();
}

function clearCart(){
  rows = [];
  current = '';
  elComment.value = '';
  elMsg.style.display = 'none';
  elDisplay.classList.remove('invalid');
  elPreviewPanel.classList.remove('invalid');
  sync();
}

async function send(){
  if(!rows.length) {
    alert('Добавь товар');
    return;
  }

  if(!feedLoaded){
    alert('Терминал ещё не готов. Дождитесь загрузки цен.');
    return;
  }

  if(isSending) return;

  isSending = true;
  elSubmit.disabled = true;

  const comment = (elComment.value || '').trim();
  const orderRows = getOrderRowsForApi();
  const orderSum = rows.reduce((sum, r) => sum + (getPrice(r.code) * r.qty), 0);

  try{
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        rows: orderRows,
        comment: comment
      })
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok || !data.success){
      alert(data.error || 'Не удалось отправить заявку');
      return;
    }

    const orderId = data.orderId || '—';

    elMsg.innerHTML = `
      <strong>Ваш заказ №${escapeHtml(orderId)} на сумму: ${escapeHtml(orderSum.toLocaleString('ru-RU'))} ₽.</strong><br>
      Спасибо за заказ! 💚
    `;
    elMsg.style.display = 'block';

    rows = [];
    current = '';
    elComment.value = '';
    sync();
  }finally{
    isSending = false;
    elSubmit.disabled = false;
  }
}

['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k=>{
  const b = document.createElement('button');
  b.className = 'key' + (k === 'ok' ? ' ok' : '');
  b.textContent = k === 'del' ? '⌫' : k === 'ok' ? 'OK' : k;
  b.onclick = ()=>{
    if(k === 'del') deleteLast();
    else if(k === 'ok') addCode(false);
    else addDigit(k);
  };
  document.getElementById('grid').appendChild(b);
});

document.getElementById('minus').onclick = ()=>{ if(rows.length) changeIndex(rows.length - 1,-1); };
document.getElementById('plus').onclick = ()=>{ if(rows.length) changeIndex(rows.length - 1,1); };

document.getElementById('submit').onclick = send;

document.getElementById('openItems').onclick = ()=>document.getElementById('itemsModal').classList.add('open');
document.getElementById('closeItems').onclick = ()=>document.getElementById('itemsModal').classList.remove('open');

document.getElementById('clearCartBtn').onclick = ()=>{
  if(!rows.length){
    alert('Корзина уже пустая');
    return;
  }

  const ok = confirm('Очистить корзину? Все позиции будут удалены.');
  if(!ok) return;

  clearCart();
  document.getElementById('itemsModal').classList.remove('open');
};

document.getElementById('openComment').onclick = ()=>{
  document.getElementById('commentModal').classList.add('open');
  setTimeout(()=>elComment.focus(),50);
};
document.getElementById('closeComment').onclick = ()=>document.getElementById('commentModal').classList.remove('open');
document.getElementById('saveComment').onclick = ()=>{
  document.getElementById('commentModal').classList.remove('open');
  sync();
};

document.getElementById('itemsList').addEventListener('click', function(e){
  const btn = e.target.closest('[data-index]');
  if(!btn) return;
  changeIndex(Number(btn.dataset.index), Number(btn.dataset.delta));
});

loadPrices();
sync();
</script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('/service-worker.js');
        console.log('SW ok');
      } catch (e) {
        console.error(e);
      }
    });
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function subscribePush() {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return alert('Нет разрешения');

    const reg = await navigator.serviceWorker.ready;

    const res = await fetch('/api/push/config');
    const { publicKey } = await res.json();

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });

    await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });

    alert('Push включен');
  }
</script>
