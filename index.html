export default function MobileOrderPage() {
  const html = String.raw`<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Мобильный заказ</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,sans-serif;color:#111827}
body{min-height:100vh}
.wrap{max-width:430px;margin:0 auto;padding:12px}
.card{background:rgba(255,255,255,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);border-radius:32px;padding:18px;box-shadow:0 18px 50px rgba(17,24,39,.08);min-height:calc(100vh - 24px)}
.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:16px}
.title{font-size:28px;font-weight:800;letter-spacing:-0.05em;line-height:1.02}
.badges{display:flex;gap:8px}
.badge{min-width:78px;text-align:center;padding:10px 12px;border-radius:18px;background:#eef2f7;color:#475569;font-size:13px;font-weight:600;border:0}
.badge b{display:block;margin-top:4px;font-size:18px;color:#111827}
.badge.dark{background:linear-gradient(180deg,#1f2937 0%,#111827 100%);color:#dbeafe;cursor:pointer}.badge.dark b{color:#fff}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:26px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.04);margin-bottom:14px}
.preview{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;min-height:64px}
.preview-code{font-size:24px;font-weight:700;letter-spacing:-0.04em;color:#111827}
.preview-empty{color:#9ca3af}
.preview-qty{min-width:28px;text-align:center;font-size:20px;font-weight:700}
.actions{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:14px;border:0;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(15,23,42,.08)}
.minus{background:#fff;color:#dc2626;border:1px solid #fecaca}.plus{background:#edfdf3;color:#16a34a;border:1px solid #bbf7d0}
.display{background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);border:1px solid #e5e7eb;border-radius:30px;padding:22px 16px;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:44px;font-weight:700;letter-spacing:.22em;box-shadow:inset 0 1px 0 rgba(255,255,255,.9);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.key{height:72px;border-radius:24px;border:1px solid #dbe2ea;background:linear-gradient(180deg,#ffffff 0%,#f7f8fa 100%);color:#2563eb;font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px rgba(15,23,42,.05)}
.key.ok{background:linear-gradient(180deg,#1f2937 0%,#111827 100%);color:#fff;border-color:#111827;font-size:24px}
.meta{display:flex;justify-content:space-between;gap:12px;margin:4px 2px 12px;color:#6b7280;font-size:14px;font-weight:600}.meta strong{color:#111827}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px}.submit{width:100%;min-height:58px;border:0;border-radius:24px;background:linear-gradient(180deg,#1f2937 0%,#111827 100%);color:#fff;font-size:19px;font-weight:800;box-shadow:0 16px 32px rgba(17,24,39,.18);cursor:pointer}.comment-btn{min-width:64px;min-height:58px;padding:0 18px;border-radius:24px;border:1px solid #dbe2ea;background:#fff;color:#111827;font-size:18px;font-weight:700;box-shadow:0 10px 24px rgba(15,23,42,.05);cursor:pointer}
.msg{display:none;background:#ecfdf5;color:#047857;border-radius:20px;padding:14px 16px;font-size:15px;font-weight:700;margin-top:12px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.36);display:none;align-items:flex-end;justify-content:center;padding:14px}.modal.open{display:flex}
.sheet{width:100%;max-width:430px;background:#fff;border-radius:30px 30px 22px 22px;padding:18px;box-shadow:0 24px 64px rgba(15,23,42,.26);max-height:78vh;overflow:auto}.sheet-handle{width:42px;height:5px;background:#d1d5db;border-radius:999px;margin:0 auto 14px}.sheet-title{font-size:22px;font-weight:800;letter-spacing:-0.04em;margin:0 0 12px}.comment{width:100%;min-height:140px;border-radius:22px;border:1px solid #e5e7eb;background:#fbfcfd;padding:16px;font:inherit;font-size:17px;color:#111827;resize:none;outline:none}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.sheet-btn{min-height:54px;border-radius:20px;border:1px solid #e5e7eb;background:#fff;color:#111827;font-size:16px;font-weight:700;cursor:pointer}.sheet-btn.primary{background:linear-gradient(180deg,#1f2937 0%,#111827 100%);color:#fff;border-color:#111827}
.items-list{display:flex;flex-direction:column;gap:10px}.item-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px 14px;border:1px solid #e5e7eb;border-radius:20px;background:#fbfcfd}.item-row-code{font-size:20px;font-weight:700}.item-row-qty{min-width:26px;text-align:center;font-size:18px;font-weight:700}.item-row-actions{display:flex;gap:8px}.item-row-btn{width:38px;height:38px;border-radius:12px;border:0;cursor:pointer;font-size:20px;font-weight:800;box-shadow:0 8px 18px rgba(15,23,42,.08)}.items-empty{padding:18px;border:1px dashed #d1d5db;border-radius:18px;color:#6b7280;text-align:center;font-size:15px;font-weight:600}
.badge.dark:active,.icon-btn:active,.key:active,.submit:active,.comment-btn:active,.sheet-btn:active,.item-row-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="title">Мобильный заказ</div>
      <div class="badges">
        <div class="badge">Позиций<b id="positions">0</b></div>
        <button type="button" class="badge dark" id="openItems">Всего<b id="total">0</b></button>
      </div>
    </div>
    <div class="panel preview">
      <div class="preview-code preview-empty" id="previewCode"></div>
      <div class="preview-qty" id="previewQty"></div>
      <div class="actions" id="previewActions" style="display:none;">
        <button type="button" class="icon-btn minus" id="minus">−</button>
        <button type="button" class="icon-btn plus" id="plus">+</button>
      </div>
    </div>
    <div class="display" id="display">****</div>
    <div class="grid" id="grid"></div>
    <div class="meta">
      <div>Комментарий: <strong id="commentState">нет</strong></div>
      <div>Сумма: <strong id="sum">0 ₽</strong></div>
    </div>
    <div class="toolbar">
      <button type="button" class="submit" id="submit">Отправить заявку</button>
      <button type="button" class="comment-btn" id="openComment">💬</button>
    </div>
    <div class="msg" id="message">Заявка отправлена. Спасибо за заказ!</div>
  </div>
</div>
<div class="modal" id="commentModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Комментарий к заказу</h3>
    <textarea id="comment" class="comment" placeholder="Напишите комментарий к заказу..."></textarea>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn" id="closeComment">Отмена</button>
      <button type="button" class="sheet-btn primary" id="saveComment">Сохранить</button>
    </div>
  </div>
</div>
<div class="modal" id="itemsModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Позиции заказа</h3>
    <div class="items-list" id="itemsList"></div>
    <div class="sheet-actions">
      <button type="button" class="sheet-btn primary" id="closeItems">Готово</button>
    </div>
  </div>
</div>
<script>
(function(){
  document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });
  let current='';
  let rows=[];
  const elDisplay=document.getElementById('display');
  const elPositions=document.getElementById('positions');
  const elTotal=document.getElementById('total');
  const elPreviewCode=document.getElementById('previewCode');
  const elPreviewQty=document.getElementById('previewQty');
  const elPreviewActions=document.getElementById('previewActions');
  const elSum=document.getElementById('sum');
  const elComment=document.getElementById('comment');
  const elCommentState=document.getElementById('commentState');
  const elMessage=document.getElementById('message');
  const elCommentModal=document.getElementById('commentModal');
  const elItemsModal=document.getElementById('itemsModal');
  const elItemsList=document.getElementById('itemsList');
  function beep(freq, duration, volume){
    try{
      const Ctx=window.AudioContext||window.webkitAudioContext;
      if(!Ctx)return;
      const ctx=new Ctx();
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.type='square';
      o.frequency.setValueAtTime(freq||880,ctx.currentTime);
      g.gain.setValueAtTime(volume||0.08,ctx.currentTime);
      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime+(duration||0.06));
    }catch(e){}
  }
  function renderItems(){
    if(!rows.length){
      elItemsList.innerHTML='<div class="items-empty">Пока нет добавленных артикулов</div>';
      return;
    }
    elItemsList.innerHTML='';
    rows.forEach(function(item,index){
      const row=document.createElement('div');
      row.className='item-row';
      row.innerHTML='<div class="item-row-code">'+item.code+'</div>'+
        '<div class="item-row-qty">'+item.qty+'</div>'+
        '<div class="item-row-actions">'+
          '<button type="button" class="item-row-btn minus" data-index="'+index+'" data-delta="-1">−</button>'+
          '<button type="button" class="item-row-btn plus" data-index="'+index+'" data-delta="1">+</button>'+
        '</div>';
      elItemsList.appendChild(row);
    });
  }
  function sync(){
    elDisplay.textContent=(current+'****').slice(0,4);
    elPositions.textContent=String(rows.length);
    elTotal.textContent=String(rows.reduce(function(s,r){ return s+r.qty; },0));
    elPreviewCode.textContent=rows.length ? rows[rows.length-1].code : '';
    elPreviewQty.textContent=rows.length ? rows[rows.length-1].qty : '';
    elPreviewActions.style.display=rows.length ? 'flex' : 'none';
    elCommentState.textContent=(elComment.value||'').trim() ? 'добавлен' : 'нет';
    elSum.textContent='0 ₽';
    renderItems();
  }
  function addDigit(d){ elMessage.style.display='none'; if(current.length<4){ current+=d; sync(); } }
  function addCode(){
    beep(860,.06,.08);
    if(current.length!==4)return;
    const found=rows.find(function(r){ return r.code===current; });
    if(found) found.qty+=1; else rows.push({code:current,qty:1});
    current='';
    sync();
  }
  function deleteLast(){ current=current.slice(0,-1); sync(); }
  function changeIndex(index,delta){
    if(index<0||index>=rows.length)return;
    beep(delta>0?980:620,.05,.06);
    rows[index].qty+=delta;
    if(rows[index].qty<=0) rows.splice(index,1);
    sync();
  }
  ['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(function(k){
    const b=document.createElement('button');
    b.type='button';
    b.className='key'+(k==='ok'?' ok':'');
    b.textContent=k==='del'?'⌫':k==='ok'?'OK':k;
    b.addEventListener('click',function(){ if(k==='del') return deleteLast(); if(k==='ok') return addCode(); addDigit(k); });
    document.getElementById('grid').appendChild(b);
  });
  document.getElementById('minus').addEventListener('click',function(){ if(rows.length) changeIndex(rows.length-1,-1); });
  document.getElementById('plus').addEventListener('click',function(){ if(rows.length) changeIndex(rows.length-1,1); });
  document.getElementById('openComment').addEventListener('click',function(){ elCommentModal.classList.add('open'); setTimeout(function(){ elComment.focus(); },50); });
  document.getElementById('closeComment').addEventListener('click',function(){ elCommentModal.classList.remove('open'); });
  document.getElementById('saveComment').addEventListener('click',function(){ elCommentModal.classList.remove('open'); sync(); });
  document.getElementById('openItems').addEventListener('click',function(){ elItemsModal.classList.add('open'); renderItems(); });
  document.getElementById('closeItems').addEventListener('click',function(){ elItemsModal.classList.remove('open'); });
  document.getElementById('submit').addEventListener('click',function(){ elMessage.style.display='block'; });
  elCommentModal.addEventListener('click',function(e){ if(e.target===elCommentModal) elCommentModal.classList.remove('open'); });
  elItemsModal.addEventListener('click',function(e){ if(e.target===elItemsModal) elItemsModal.classList.remove('open'); });
  elItemsList.addEventListener('click',function(e){ const btn=e.target.closest('[data-index]'); if(!btn)return; changeIndex(Number(btn.dataset.index), Number(btn.dataset.delta)); });
  sync();
})();
</script>
</body>
</html>`;

  return <iframe title="Мобильный заказ" className="w-full h-screen border-0 bg-[#f5f5f7]" srcDoc={html} />;
}
