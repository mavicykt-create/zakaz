<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мобильный заказ</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;color:#111827}
.wrap{max-width:420px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:28px;padding:16px;box-shadow:0 18px 50px rgba(17,24,39,.08)}
.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.title{font-size:24px;font-weight:700;letter-spacing:-0.03em}
.badge{padding:10px 14px;border-radius:16px;background:#eef2f7;border:0}
.badge.dark{background:#111;color:#fff;cursor:pointer}
.display{font-size:42px;text-align:center;margin:14px 0;font-family:monospace;letter-spacing:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:70px;border-radius:18px;font-size:26px;border:0;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.05);color:#2563eb}
.ok{background:#111;color:#fff}
.submit{margin-top:14px;width:100%;height:56px;border-radius:18px;background:#111;color:#fff;border:0;font-size:18px;font-weight:700}
.meta{display:flex;justify-content:space-between;gap:12px;margin-top:10px;font-weight:600}
.meta small{display:block;color:#6b7280;font-weight:500}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end}
.modal.open{display:flex}
.sheet{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:16px;max-height:70vh;overflow:auto}
.item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px 0;border-bottom:1px solid #eee}
.item-main{display:flex;flex-direction:column;gap:4px}
.item-code{font-weight:700}
.item-price{font-size:13px;color:#6b7280}
.item-controls{display:flex;align-items:center;gap:8px}
.item-controls button{width:34px;height:34px;border-radius:10px;border:0}
.msg{display:none;background:#ecfdf5;color:#047857;border-radius:16px;padding:12px 14px;margin-top:12px;font-weight:600}
.comment-btn{border:0;background:#fff;border-radius:16px;padding:0 14px;box-shadow:0 8px 20px rgba(15,23,42,.05);font-size:18px}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px}
textarea{width:100%;min-height:140px;border-radius:16px;border:1px solid #e5e7eb;padding:12px;font:inherit}
.feedstatus{margin-top:8px;color:#6b7280;font-size:13px}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="head">
  <div class="title">Мобильный заказ</div>
  <button class="badge dark" id="openItems">Всего <b id="total">0</b></button>
</div>

<div class="display" id="display">****</div>

<div class="grid" id="grid"></div>

<div class="meta">
  <div>
    <small>Комментарий</small>
    <span id="commentState">нет</span>
  </div>
  <div style="text-align:right">
    <small>Сумма</small>
    <span id="sum">0 ₽</span>
  </div>
</div>

<div class="feedstatus" id="feedStatus">Загрузка цен…</div>

<div class="toolbar">
  <button class="submit" id="submit">Отправить заявку</button>
  <button class="comment-btn" id="openComment">💬</button>
</div>

<div class="msg" id="msg">Заявка отправлена</div>

</div>
</div>

<div class="modal" id="itemsModal">
  <div class="sheet">
    <h3>Позиции</h3>
    <div id="itemsList"></div>
    <button id="closeItems">Готово</button>
  </div>
</div>

<div class="modal" id="commentModal">
  <div class="sheet">
    <h3>Комментарий</h3>
    <textarea id="comment" placeholder="Напишите комментарий к заказу..."></textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <button id="closeComment">Отмена</button>
      <button id="saveComment">Сохранить</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('dblclick', function(e){ e.preventDefault(); }, { passive:false });

let rows = [];
let current = '';
let PRODUCTS = {};

const elDisplay = document.getElementById('display');
const elTotal = document.getElementById('total');
const elSum = document.getElementById('sum');
const elMsg = document.getElementById('msg');
const elFeedStatus = document.getElementById('feedStatus');
const elComment = document.getElementById('comment');
const elCommentState = document.getElementById('commentState');

function beep(freq){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = freq;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.05);
  }catch(e){}
}

async function loadPrices(){
  try{
    const res = await fetch('/.netlify/functions/products');
    if(!res.ok) throw new Error('feed');
    PRODUCTS = await res.json();
    elFeedStatus.textContent = 'Цены загружены';
    sync();
  }catch(e){
    elFeedStatus.textContent = 'Цены не загружены';
  }
}

function getPrice(code){
  const p = PRODUCTS[code];
  return p ? Number(p.price || 0) : 0;
}

function sync(){
  elDisplay.textContent = (current + '****').slice(0,4);
  elTotal.textContent = rows.reduce((s,r)=>s+r.qty,0);

  let sum = 0;
  rows.forEach(r => sum += r.qty * getPrice(r.code));
  elSum.textContent = sum.toLocaleString('ru-RU') + ' ₽';

  elCommentState.textContent = (elComment.value || '').trim() ? 'добавлен' : 'нет';

  renderItems();
}

function addDigit(d){
  elMsg.style.display = 'none';
  if(current.length < 4){
    current += d;
    sync();
  }
}

function addCode(){
  beep(800);
  if(current.length !== 4) return;

  const found = rows.find(r => r.code === current);
  if(found) found.qty++;
  else rows.push({code: current, qty: 1});

  current = '';
  sync();
}

function renderItems(){
  const el = document.getElementById('itemsList');
  el.innerHTML = '';

  if(!rows.length){
    el.innerHTML = '<div style="color:#6b7280">Пока нет позиций</div>';
    return;
  }

  rows.forEach((r,i)=>{
    const price = getPrice(r.code);
    const lineSum = price * r.qty;

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML =
      '<div class="item-main">' +
        '<div class="item-code">' + r.code + '</div>' +
        '<div class="item-price">' + price.toLocaleString('ru-RU') + ' ₽ × ' + r.qty + ' = ' + lineSum.toLocaleString('ru-RU') + ' ₽</div>' +
      '</div>' +
      '<div class="item-controls">' +
        '<button onclick="change(' + i + ',-1)">−</button>' +
        '<div>' + r.qty + '</div>' +
        '<button onclick="change(' + i + ',1)">+</button>' +
      '</div>';
    el.appendChild(div);
  });
}

function change(i,d){
  beep(d>0 ? 900 : 500);
  rows[i].qty += d;
  if(rows[i].qty <= 0) rows.splice(i,1);
  sync();
}

async function send(){
  if(!rows.length) return alert('Добавь товар');

  let total = 0;

  const lines = rows.map(r => {
    const price = getPrice(r.code);
    const lineSum = price * r.qty;
    total += lineSum;
    return r.code + '\t' + r.qty;
  });

  const comment = (elComment.value || '').trim();

  let fullText = 'Артикул\tКоличество\n' + lines.join('\n') + '\n\n' +
    'Сумма: ' + total.toLocaleString('ru-RU') + ' ₽';

  if(comment){
    fullText += '\nКомментарий: ' + comment;
  }

  const res = await fetch('/.netlify/functions/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text: fullText })
  });

  if(!res.ok){
    alert('Не удалось отправить заявку');
    return;
  }

  elMsg.style.display = 'block';
  rows = [];
  current = '';
  elComment.value = '';
  sync();
}

['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k=>{
  const b = document.createElement('button');
  b.className = 'key' + (k==='ok' ? ' ok' : '');
  b.textContent = k==='del' ? '⌫' : k==='ok' ? 'OK' : k;
  b.onclick = ()=>{
    if(k==='del') current = current.slice(0,-1);
    else if(k==='ok') addCode();
    else addDigit(k);
    sync();
  };
  document.getElementById('grid').appendChild(b);
});

document.getElementById('submit').onclick = send;
document.getElementById('openItems').onclick = ()=>document.getElementById('itemsModal').classList.add('open');
document.getElementById('closeItems').onclick = ()=>document.getElementById('itemsModal').classList.remove('open');

document.getElementById('openComment').onclick = ()=>document.getElementById('commentModal').classList.add('open');
document.getElementById('closeComment').onclick = ()=>document.getElementById('commentModal').classList.remove('open');
document.getElementById('saveComment').onclick = ()=>{
  document.getElementById('commentModal').classList.remove('open');
  sync();
};

loadPrices();
sync();
</script>

</body>
</html>
