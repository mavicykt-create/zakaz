<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мобильный заказ</title>
  <style>
    :root{
      --bg:#f4f5f7;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0b132b;
      --blue:#2f80ed;
      --green:#16a34a;
      --red:#dc2626;
      --success-bg:#ecfdf5;
      --success:#047857;
      --shadow:0 18px 50px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:linear-gradient(180deg,#f7f7f8 0%,#f1f3f6 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif}
    .wrap{max-width:460px;margin:0 auto;padding:18px 14px 28px}
    .card{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);border-radius:32px;padding:18px;box-shadow:var(--shadow)}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px}
    .title{font-size:26px;line-height:1.05;font-weight:800;letter-spacing:-0.03em;margin:2px 0 0}
    .badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .badge{min-width:74px;text-align:center;padding:10px 12px;border-radius:18px;background:#eef2f7;color:#334155;font-size:13px;font-weight:600;line-height:1.15}
    .badge b{display:block;margin-top:2px;font-size:18px;color:var(--ink)}
    .badge.dark{background:var(--accent);color:#dbe4ff}.badge.dark b{color:#fff}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:0 6px 16px rgba(15,23,42,.04)}
    .preview{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;min-height:68px;margin-bottom:14px}
    .preview-code{font-size:26px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
    .preview-empty{color:#9ca3af;font-size:20px;font-weight:600}
    .preview-qty{min-width:44px;text-align:center;font-size:20px;font-weight:700;color:var(--ink)}
    .actions{display:flex;gap:8px}
    .icon-btn{width:40px;height:40px;border:0;border-radius:14px;cursor:pointer;font-size:20px;font-weight:800;transition:.15s ease;box-shadow:0 8px 18px rgba(15,23,42,.08)}
    .icon-btn:active,.key:active,.submit:active,.comment-btn:active,.sheet-btn:active{transform:scale(.97)}
    .minus{background:#fff;color:var(--red);border:1px solid #fecaca}
    .plus{background:#eefbf3;color:var(--green);border:1px solid #bbf7d0}
    .display-wrap{margin-bottom:14px}
    .display-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#9aa3b2;margin:0 0 8px 4px}
    .display{background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);border:1px solid var(--line);border-radius:28px;padding:20px 16px;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:44px;font-weight:700;letter-spacing:.22em;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .key{height:68px;border-radius:22px;border:1px solid #dbe2ea;background:linear-gradient(180deg,#ffffff 0%,#f7f8fa 100%);color:var(--blue);font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(15,23,42,.05);transition:.15s ease}
    .key.ok{background:linear-gradient(180deg,#101938 0%,#0b132b 100%);color:#fff;border-color:#0b132b;font-size:24px;letter-spacing:-0.02em}
    .key.delete{color:var(--blue);font-size:24px}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px}
    .submit{width:100%;min-height:58px;border:0;border-radius:22px;background:linear-gradient(180deg,#101938 0%,#0b132b 100%);color:#fff;font-size:19px;font-weight:800;letter-spacing:-0.02em;cursor:pointer;box-shadow:0 14px 30px rgba(11,19,43,.18)}
    .submit:disabled{opacity:.6;cursor:not-allowed}
    .comment-btn{min-width:64px;min-height:58px;padding:0 18px;border-radius:22px;border:1px solid #dbe2ea;background:#fff;color:var(--accent);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(15,23,42,.05)}
    .comment-state{font-size:13px;color:var(--muted);margin-top:-2px;margin-bottom:6px;padding-left:2px}.comment-state strong{color:var(--ink)}
    .msg{display:none;background:var(--success-bg);color:var(--success);border-radius:20px;padding:16px 18px;font-size:16px;font-weight:600}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.34);display:none;align-items:flex-end;justify-content:center;padding:14px;z-index:1000}
    .modal.open{display:flex}
    .sheet{width:100%;max-width:460px;background:#fff;border-radius:28px 28px 20px 20px;padding:18px;box-shadow:0 22px 60px rgba(15,23,42,.25);animation:up .18s ease}
    @keyframes up{from{transform:translateY(18px);opacity:.7}to{transform:translateY(0);opacity:1}}
    .sheet-handle{width:42px;height:5px;background:#d1d5db;border-radius:999px;margin:0 auto 14px}
    .sheet-title{font-size:22px;font-weight:800;letter-spacing:-0.03em;margin:0 0 12px;color:var(--ink)}
    .comment{width:100%;min-height:150px;border-radius:22px;border:1px solid var(--line);background:#fbfcfd;padding:16px;font:inherit;font-size:17px;color:var(--ink);resize:none;outline:none}
    .comment::placeholder{color:#b2b9c5}
    .sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .sheet-btn{min-height:54px;border-radius:18px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:16px;font-weight:700;cursor:pointer}
    .sheet-btn.primary{background:linear-gradient(180deg,#101938 0%,#0b132b 100%);color:#fff;border-color:#0b132b}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="title">Мобильный заказ</div>
        <div class="badges">
          <div class="badge">Позиций<b id="positions">0</b></div>
          <div class="badge dark">Всего<b id="total">0</b></div>
        </div>
      </div>
      <div class="panel preview">
        <div class="preview-code preview-empty" id="previewCode">Введите артикул</div>
        <div class="preview-qty" id="previewQty"></div>
        <div class="actions" id="previewActions" style="display:none;">
          <button type="button" class="icon-btn minus" id="minus">−</button>
          <button type="button" class="icon-btn plus" id="plus">+</button>
        </div>
      </div>
      <div class="display-wrap">
        <div class="display-label">Ввод</div>
        <div class="display" id="display">••••</div>
      </div>
      <div class="grid" id="grid"></div>
      <div class="comment-state" id="commentState">Комментарий: <strong>не добавлен</strong></div>
      <div class="toolbar">
        <button type="button" class="submit" id="submit">Отправить заявку</button>
        <button type="button" class="comment-btn" id="openComment">💬</button>
      </div>
      <div class="msg" id="message">Заявка отправлена. Спасибо за заказ!</div>
    </div>
  </div>
  <div class="modal" id="commentModal">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Комментарий к заказу</h3>
      <textarea id="comment" class="comment" placeholder="Напишите комментарий к заказу..."></textarea>
      <div class="sheet-actions">
        <button type="button" class="sheet-btn" id="closeComment">Отмена</button>
        <button type="button" class="sheet-btn primary" id="saveComment">Сохранить</button>
      </div>
    </div>
  </div>
<script>
(function(){
 let currentCode='';
 let rows=[];
 let sending=false;
 const elDisplay=document.getElementById('display');
 const elPositions=document.getElementById('positions');
 const elTotal=document.getElementById('total');
 const elPreviewCode=document.getElementById('previewCode');
 const elPreviewQty=document.getElementById('previewQty');
 const elPreviewActions=document.getElementById('previewActions');
 const elComment=document.getElementById('comment');
 const elMessage=document.getElementById('message');
 const elSubmit=document.getElementById('submit');
 const elCommentState=document.getElementById('commentState');
 const elModal=document.getElementById('commentModal');
 const elOpenComment=document.getElementById('openComment');
 const elCloseComment=document.getElementById('closeComment');
 const elSaveComment=document.getElementById('saveComment');
 function beep(){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const ctx=new A();const o=ctx.createOscillator();const g=ctx.createGain();o.type='square';o.frequency.setValueAtTime(880,ctx.currentTime);g.gain.setValueAtTime(0.08,ctx.currentTime);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.07);}catch(e){}}
 function syncUi(){
   elDisplay.textContent=(currentCode+'••••').slice(0,4);
   elPositions.textContent=String(rows.length);
   elTotal.textContent=String(rows.reduce((s,r)=>s+r.quantity,0));
   if(!rows.length){
     elPreviewCode.textContent='Введите артикул';
     elPreviewCode.classList.add('preview-empty');
     elPreviewQty.textContent='';
     elPreviewActions.style.display='none';
   } else {
     const last=rows[rows.length-1];
     elPreviewCode.textContent=last.article;
     elPreviewCode.classList.remove('preview-empty');
     elPreviewQty.textContent=last.quantity;
     elPreviewActions.style.display='flex';
   }
   const hasComment=!!(elComment.value||'').trim();
   elCommentState.innerHTML=hasComment ? 'Комментарий: <strong>добавлен</strong>' : 'Комментарий: <strong>не добавлен</strong>';
 }
 function addDigit(d){elMessage.style.display='none';if(currentCode.length>=4)return;currentCode+=d;syncUi();}
 function deleteLast(){elMessage.style.display='none';currentCode=currentCode.slice(0,-1);syncUi();}
 function addCode(){beep();if(currentCode.length!==4){alert('Введите 4 цифры артикула.');return;}const code=currentCode;const found=rows.find(r=>r.article===code);if(found){found.quantity+=1;}else{rows.push({article:code,quantity:1});}currentCode='';syncUi();}
 function updateQty(delta){if(!rows.length)return;const last=rows[rows.length-1];last.quantity+=delta;if(last.quantity<=0)rows.pop();syncUi();}
 async function submitOrder(){
   if(!rows.length){alert('Добавь хотя бы один артикул.');return;}
   if(sending)return;
   sending=true;
   elSubmit.disabled=true;
   elMessage.style.display='none';
   try{
     const response = await fetch('/.netlify/functions/order', {
       method:'POST',
       headers:{'Content-Type':'application/json'},
       body:JSON.stringify({rows,comment:elComment.value||''})
     });
     if(!response.ok){throw new Error('Request failed');}
     currentCode=''; rows=[]; elComment.value=''; syncUi(); elMessage.style.display='block';
   }catch(e){alert('Не удалось отправить заявку.');}
   finally{sending=false;elSubmit.disabled=false;}
 }
 function openComment(){elModal.classList.add('open');setTimeout(()=>elComment.focus(),50)}
 function closeComment(){elModal.classList.remove('open')}
 function saveComment(){closeComment();syncUi()}
 ['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(key=>{
   const btn=document.createElement('button');
   btn.type='button';
   btn.className='key'+(key==='ok'?' ok':'')+(key==='del'?' delete':'');
   btn.textContent=key==='del'?'⌫':key==='ok'?'OK':key;
   btn.addEventListener('click',()=>{if(key==='del')return deleteLast(); if(key==='ok')return addCode(); addDigit(key);});
   document.getElementById('grid').appendChild(btn);
 });
 document.getElementById('minus').addEventListener('click',()=>updateQty(-1));
 document.getElementById('plus').addEventListener('click',()=>updateQty(1));
 elSubmit.addEventListener('click',submitOrder);
 elOpenComment.addEventListener('click',openComment);
 elCloseComment.addEventListener('click',closeComment);
 elSaveComment.addEventListener('click',saveComment);
 elModal.addEventListener('click',(e)=>{if(e.target===elModal)closeComment();});
 syncUi();
})();
</script>
</body>
</html>
