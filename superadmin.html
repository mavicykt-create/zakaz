<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Superadmin — Сладкая планета</title>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --ink:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;

  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#d97706;

  --blue-bg:#eff6ff;
  --green-bg:#ecfdf5;
  --red-bg:#fef2f2;
  --orange-bg:#fff7ed;
  --gray-bg:#f9fafb;

  --shadow:0 10px 30px rgba(17,24,39,.07);
  --radius:18px;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--ink);
}

body{
  min-height:100vh;
}

.wrap{
  max-width:1380px;
  margin:0 auto;
  padding:18px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.top-left{
  display:flex;
  flex-direction:column;
  gap:6px;
}

h1{
  margin:0;
  font-size:32px;
  line-height:1;
  letter-spacing:-0.03em;
}

.sub{
  color:var(--muted);
  font-size:14px;
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  min-height:44px;
  padding:11px 15px;
  border-radius:12px;
  border:0;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:.15s ease;
}

.btn:active{
  transform:scale(.98);
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.btn.dark{ background:#111827; color:#fff; }
.btn.blue{ background:var(--blue); color:#fff; }
.btn.green{ background:var(--green); color:#fff; }
.btn.red{ background:var(--red); color:#fff; }
.btn.gray{ background:#e5e7eb; color:#111827; }
.btn.orange{ background:var(--orange); color:#fff; }

.notice{
  display:none;
  margin-bottom:16px;
  padding:14px 16px;
  border-radius:14px;
  background:var(--green-bg);
  color:#166534;
  font-weight:700;
  box-shadow:var(--shadow);
}

.errorbar{
  display:none;
  margin-bottom:16px;
  padding:14px 16px;
  border-radius:14px;
  background:var(--red-bg);
  color:#b91c1c;
  font-weight:700;
  box-shadow:var(--shadow);
}

.stats{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:var(--card);
  border-radius:16px;
  padding:14px 16px;
  box-shadow:var(--shadow);
}

.stat-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.stat-value{
  font-size:26px;
  font-weight:800;
  line-height:1;
}

.layout{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:16px;
}

.side{
  display:flex;
  flex-direction:column;
  gap:16px;
  position:sticky;
  top:16px;
  align-self:start;
}

.panel{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
}

.panel-title{
  margin:0 0 12px;
  font-size:20px;
  line-height:1.1;
  letter-spacing:-0.02em;
}

.search{
  width:100%;
  min-height:46px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:0 14px;
  font-size:15px;
  background:#fff;
}

.filters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.toggle{
  min-height:44px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.toggle.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
}

.push-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.push-stat{
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  background:var(--gray-bg);
}

.push-stat small{
  display:block;
  color:var(--muted);
  margin-bottom:6px;
  font-size:12px;
}

.push-stat strong{
  font-size:20px;
  line-height:1;
}

.field{
  margin-bottom:10px;
}

.field:last-child{
  margin-bottom:0;
}

.field input,
.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
  font-family:inherit;
  background:#fff;
}

.field textarea{
  min-height:110px;
  resize:vertical;
}

.push-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.push-actions .btn{
  width:100%;
}

.push-result{
  display:none;
  margin-top:12px;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
  line-height:1.45;
}

.push-result.ok{
  display:block;
  background:var(--green-bg);
  color:#166534;
}

.push-result.error{
  display:block;
  background:var(--red-bg);
  color:#b91c1c;
}

.orders-wrap{
  min-width:0;
}

.orders{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.empty{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
}

.order{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  border-left:6px solid #d1d5db;
}

.order.new{
  border-left-color:var(--orange);
}

.order.done{
  border-left-color:var(--green);
  opacity:.96;
}

.order.cancelled{
  border-left-color:var(--red);
  opacity:.86;
}

.order-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.order-title{
  font-size:24px;
  font-weight:800;
  line-height:1;
  margin-bottom:6px;
}

.order-time{
  font-size:13px;
  color:var(--muted);
}

.order-badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.badge.new{
  background:var(--orange-bg);
  color:#9a3412;
}

.badge.done{
  background:var(--green-bg);
  color:#166534;
}

.badge.cancelled{
  background:var(--red-bg);
  color:#b91c1c;
}

.badge.sum{
  background:var(--blue-bg);
  color:#1d4ed8;
}

.order-grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:14px;
}

.box{
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.box-title{
  padding:12px 14px;
  font-size:14px;
  font-weight:800;
  border-bottom:1px solid var(--line);
  background:var(--gray-bg);
}

.rows{
  display:flex;
  flex-direction:column;
}

.row{
  display:grid;
  grid-template-columns:1.2fr .6fr .8fr .8fr;
  gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  align-items:center;
}

.row:last-child{
  border-bottom:none;
}

.row.headline{
  background:#111827;
  color:#fff;
  font-size:13px;
  font-weight:700;
}

.article{
  font-size:18px;
  font-weight:800;
}

.qty,.price,.line-sum{
  font-weight:700;
}

.meta{
  padding:14px;
}

.meta-row{
  margin-bottom:12px;
  font-size:14px;
}

.meta-row:last-child{
  margin-bottom:0;
}

.meta-label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.raw{
  white-space:pre-wrap;
  background:var(--gray-bg);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  line-height:1.4;
}

.order-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}

.order-actions .btn{
  min-width:120px;
}

@media (max-width:1280px){
  .stats{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
}

@media (max-width:1120px){
  .layout{
    grid-template-columns:1fr;
  }

  .side{
    position:static;
  }
}

@media (max-width:860px){
  .stats{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .order-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:640px){
  .filters,
  .push-actions{
    grid-template-columns:1fr;
  }

  .row{
    grid-template-columns:1fr .7fr;
  }

  .row .price,
  .row .line-sum,
  .row.headline .price,
  .row.headline .line-sum{
    display:none;
  }

  .order-actions .btn,
  .top-actions .btn{
    width:100%;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-left">
      <h1>Superadmin</h1>
      <div class="sub">Новые заказы сверху. Автообновление каждые 3 секунды.</div>
    </div>

    <div class="top-actions">
      <button class="btn dark" id="refreshBtn">Обновить</button>
      <button class="btn blue" id="copyFirstBtn">Копировать первый новый</button>
    </div>
  </div>

  <div id="notice" class="notice">Поступил новый заказ</div>
  <div id="errorbar" class="errorbar">Ошибка</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Всего заказов</div>
      <div class="stat-value" id="statAll">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Новые</div>
      <div class="stat-value" id="statNew">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Обработаны</div>
      <div class="stat-value" id="statDone">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Отменены</div>
      <div class="stat-value" id="statCancelled">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Сейчас в заказе</div>
      <div class="stat-value" id="liveUsers">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Сумма корзин</div>
      <div class="stat-value" id="liveSum">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Средний чек онлайн</div>
      <div class="stat-value" id="liveAvg">0 ₽</div>
    </div>
  </div>

  <div class="layout">
    <aside class="side">
      <div class="panel">
        <h2 class="panel-title">Фильтр</h2>
        <input class="search" id="search" placeholder="Поиск по ID, артикулу, комментарию..." />

        <div class="filters">
          <button class="toggle" id="showAllBtn">Все заказы</button>
          <button class="toggle active" id="showOnlyNewBtn">Только новые</button>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">Push-уведомления</h2>

        <div class="push-stats">
          <div class="push-stat">
            <small>Push на сервере</small>
            <strong id="pushEnabled">—</strong>
          </div>
          <div class="push-stat">
            <small>Подписчиков</small>
            <strong id="pushSubscriptions">0</strong>
          </div>
        </div>

        <div class="field">
          <input id="pushTitle" type="text" value="Сладкая планета" placeholder="Заголовок" />
        </div>

        <div class="field">
          <textarea id="pushBody" placeholder="Текст уведомления"></textarea>
        </div>

        <div class="field">
          <input id="pushUrl" type="text" value="/" placeholder="Ссылка, например /" />
        </div>

        <div class="push-actions">
          <button class="btn gray" id="checkPushBtn">Проверить</button>
          <button class="btn orange" id="pricePushBtn">Обновление прайса</button>
          <button class="btn green" id="testPushBtn">Тест</button>
          <button class="btn dark" id="sendPushBtn">Отправить всем</button>
        </div>

        <div id="pushResult" class="push-result"></div>
      </div>
    </aside>

    <main class="orders-wrap">
      <div id="orders" class="orders"></div>
    </main>
  </div>
</div>

<script>
let orders = [];
let products = {};
let lastTopOrderId = null;
let audioUnlocked = false;
let showOnlyNew = true;
let isRefreshing = false;

const elOrders = document.getElementById('orders');
const elNotice = document.getElementById('notice');
const elErrorbar = document.getElementById('errorbar');
const elRefreshBtn = document.getElementById('refreshBtn');
const elCopyFirstBtn = document.getElementById('copyFirstBtn');

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function formatMoney(value){
  return Number(value || 0).toLocaleString('ru-RU') + ' ₽';
}

function formatDate(value){
  try{
    return new Date(value).toLocaleString('ru-RU');
  }catch{
    return value || '—';
  }
}

function setError(message){
  if(!message){
    elErrorbar.style.display = 'none';
    elErrorbar.textContent = '';
    return;
  }

  elErrorbar.textContent = message;
  elErrorbar.style.display = 'block';
}

function unlockAudio(){
  audioUnlocked = true;
}

function beepNewOrder(){
  if(!audioUnlocked) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;

    const o1 = ctx.createOscillator();
    const g1 = ctx.createGain();
    o1.type = 'sine';
    o1.frequency.value = 880;
    g1.gain.setValueAtTime(0.0001, now);
    g1.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
    g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    o1.connect(g1);
    g1.connect(ctx.destination);
    o1.start(now);
    o1.stop(now + 0.16);

    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.value = 1175;
    g2.gain.setValueAtTime(0.0001, now + 0.10);
    g2.gain.exponentialRampToValueAtTime(0.07, now + 0.12);
    g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);
    o2.connect(g2);
    g2.connect(ctx.destination);
    o2.start(now + 0.10);
    o2.stop(now + 0.26);
  }catch(e){}
}

function showNotice(text){
  elNotice.textContent = text;
  elNotice.style.display = 'block';

  clearTimeout(showNotice._t);
  showNotice._t = setTimeout(() => {
    elNotice.style.display = 'none';
  }, 2500);
}

function getStatusText(status){
  if(status === 'done') return 'Обработан';
  if(status === 'cancelled') return 'Отменён';
  return 'Новый';
}

function sortOrders(list){
  return [...list].sort((a, b) => {
    const rank = status => {
      if (status === 'new') return 0;
      if (status === 'done') return 1;
      if (status === 'cancelled') return 2;
      return 3;
    };

    const r = rank(a.status) - rank(b.status);
    if (r !== 0) return r;

    return new Date(b.createdAt) - new Date(a.createdAt);
  });
}

function getOrderExcelText(order){
  return (order.items || []).map(i => `${i.article}\t${i.quantity}`).join('\\n');
}

async function copyOrder(order, button){
  try{
    await navigator.clipboard.writeText(getOrderExcelText(order));

    if(button){
      const old = button.textContent;
      const oldClass = button.className;
      button.textContent = 'Скопировано';
      button.className = 'btn green';

      setTimeout(() => {
        button.textContent = old;
        button.className = oldClass;
      }, 1200);
    }
  }catch(e){
    alert('Не удалось скопировать');
  }
}

async function fetchJson(url, options = {}){
  const res = await fetch(url, {
    cache: 'no-store',
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    throw new Error(data.error || `Ошибка запроса ${res.status}`);
  }

  return data;
}

async function loadProducts(){
  try{
    const data = await fetchJson('/api/products', { method:'GET', headers:{} });
    products = data && typeof data === 'object' ? data : {};
  }catch(e){
    products = {};
  }
}

function calcOrderSum(order){
  let total = 0;

  (order.items || []).forEach(i => {
    const price = Number(products[i.article]?.price || 0);
    total += price * Number(i.quantity || 0);
  });

  return total;
}

async function loadOrders(){
  const data = await fetchJson('/api/orders', { method:'GET', headers:{} });
  const nextOrders = Array.isArray(data.orders) ? data.orders : [];
  const sorted = sortOrders(nextOrders);

  if (sorted.length > 0) {
    const newTopId = sorted[0].id;

    if (lastTopOrderId !== null && newTopId !== lastTopOrderId) {
      showNotice('Поступил новый заказ');
      beepNewOrder();
    }

    lastTopOrderId = newTopId;
  }

  orders = sorted;
}

async function patchStatus(orderId, status){
  const data = await fetchJson('/api/orders/' + orderId + '/status', {
    method:'PATCH',
    body: JSON.stringify({ status })
  });

  if (!data.success) {
    throw new Error(data.error || 'Не удалось изменить статус');
  }

  const idx = orders.findIndex(o => Number(o.id) === Number(orderId));
  if (idx !== -1) {
    orders[idx] = { ...orders[idx], status };
    orders = sortOrders(orders);
  }

  return true;
}

function setPushResult(message, isError = false){
  const el = document.getElementById('pushResult');
  el.className = 'push-result ' + (isError ? 'error' : 'ok');
  el.textContent = message;
}

async function loadPushStats(){
  try{
    const data = await fetchJson('/api/push/stats', { method:'GET', headers:{} });
    document.getElementById('pushEnabled').textContent = data.enabled ? 'Включён' : 'Выключен';
    document.getElementById('pushSubscriptions').textContent = data.subscriptions ?? 0;
  }catch(e){
    document.getElementById('pushEnabled').textContent = 'Ошибка';
    document.getElementById('pushSubscriptions').textContent = '—';
  }
}

async function loadLiveStats(){
  try{
    const data = await fetchJson('/api/live/stats', { method:'GET', headers:{} });
    document.getElementById('liveUsers').textContent = Number(data.users || 0).toLocaleString('ru-RU');
    document.getElementById('liveSum').textContent = formatMoney(data.total || 0);
    document.getElementById('liveAvg').textContent = formatMoney(data.avg || 0);
  }catch(e){
    document.getElementById('liveUsers').textContent = '—';
    document.getElementById('liveSum').textContent = '—';
    document.getElementById('liveAvg').textContent = '—';
  }
}

function getPushPayload(){
  return {
    title: document.getElementById('pushTitle').value.trim() || 'Сладкая планета',
    body: document.getElementById('pushBody').value.trim(),
    url: document.getElementById('pushUrl').value.trim() || '/'
  };
}

async function sendPush(payload){
  const data = await fetchJson('/api/push/send', {
    method:'POST',
    body: JSON.stringify(payload)
  });

  if(!data.success){
    throw new Error(data.error || 'Не удалось отправить push');
  }

  return data;
}

async function sendPushForOrder(order){
  const payload = {
    title: 'Сладкая планета',
    body: `Новый заказ #${order.id}. Позиций: ${order.totalQuantity || 0}. Сумма: ${formatMoney(calcOrderSum(order))}`,
    url: '/'
  };

  try{
    const data = await sendPush(payload);
    await loadPushStats();
    showNotice(`Push отправлен: ${data.sent ?? 0}`);
  }catch(e){
    alert(e.message || 'Ошибка push');
  }
}

function updateCounters(){
  document.getElementById('statAll').textContent = orders.length;
  document.getElementById('statNew').textContent = orders.filter(o => o.status === 'new').length;
  document.getElementById('statDone').textContent = orders.filter(o => o.status === 'done').length;
  document.getElementById('statCancelled').textContent = orders.filter(o => o.status === 'cancelled').length;
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();

  updateCounters();

  const filtered = orders.filter(order => {
    if (showOnlyNew && order.status !== 'new') return false;

    const haystack = [
      order.id,
      order.comment,
      order.customerName,
      order.customerPhone,
      order.rawText,
      ...(order.items || []).map(i => i.article)
    ].join(' ').toLowerCase();

    return !q || haystack.includes(q);
  });

  if(!filtered.length){
    elOrders.innerHTML = '<div class="empty">Подходящих заказов нет</div>';
    return;
  }

  elOrders.innerHTML = '';

  filtered.forEach(order => {
    const orderSum = calcOrderSum(order);

    const div = document.createElement('div');
    div.className = 'order ' + (order.status || 'new');

    div.innerHTML = `
      <div class="order-head">
        <div>
          <div class="order-title">#${escapeHtml(order.id)}</div>
          <div class="order-time">${escapeHtml(formatDate(order.createdAt))}</div>
        </div>

        <div class="order-badges">
          <div class="badge ${(order.status || 'new')}">${escapeHtml(getStatusText(order.status))}</div>
          <div class="badge sum">${escapeHtml(formatMoney(orderSum))}</div>
        </div>
      </div>

      <div class="order-grid">
        <div class="box">
          <div class="box-title">Позиции</div>
          <div class="rows">
            <div class="row headline">
              <div>Артикул</div>
              <div>Кол-во</div>
              <div class="price">Цена</div>
              <div class="line-sum">Сумма</div>
            </div>

            ${(order.items || []).map(item => {
              const price = Number(products[item.article]?.price || 0);
              const lineSum = price * Number(item.quantity || 0);

              return `
                <div class="row">
                  <div class="article">${escapeHtml(item.article)}</div>
                  <div class="qty">${escapeHtml(item.quantity)}</div>
                  <div class="price">${escapeHtml(formatMoney(price))}</div>
                  <div class="line-sum">${escapeHtml(formatMoney(lineSum))}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div class="box">
          <div class="box-title">Информация</div>
          <div class="meta">
            <div class="meta-row">
              <span class="meta-label">Комментарий</span>
              <div>${order.comment ? escapeHtml(order.comment) : '—'}</div>
            </div>

            <div class="meta-row">
              <span class="meta-label">Клиент</span>
              <div>${order.customerName ? escapeHtml(order.customerName) : '—'}</div>
            </div>

            <div class="meta-row">
              <span class="meta-label">Телефон</span>
              <div>${order.customerPhone ? escapeHtml(order.customerPhone) : '—'}</div>
            </div>

            <div class="meta-row">
              <span class="meta-label">Исходный текст</span>
              <div class="raw">${order.rawText ? escapeHtml(order.rawText) : '—'}</div>
            </div>

            <div class="order-actions">
              <button class="btn blue" data-copy="${order.id}">Копировать</button>
              ${order.status === 'new' ? `<button class="btn orange" data-push="${order.id}">Push по заказу</button>` : ''}
              ${order.status !== 'done' ? `<button class="btn green" data-done="${order.id}">Готово</button>` : ''}
              ${order.status !== 'cancelled' ? `<button class="btn red" data-cancel="${order.id}">Отмена</button>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;

    elOrders.appendChild(div);
  });
}

async function refreshAll(showErrors = true){
  if (isRefreshing) return;
  isRefreshing = true;

  try{
    setError('');
    await Promise.all([
      loadProducts(),
      loadPushStats(),
      loadLiveStats()
    ]);
    await loadOrders();
    render();
  }catch(e){
    if (showErrors) {
      setError(e.message || 'Ошибка загрузки данных');
    }
  }finally{
    isRefreshing = false;
  }
}

document.addEventListener('click', unlockAudio, { once:true });
document.addEventListener('keydown', unlockAudio, { once:true });

document.getElementById('search').addEventListener('input', render);

document.getElementById('showAllBtn').addEventListener('click', () => {
  showOnlyNew = false;
  document.getElementById('showAllBtn').classList.add('active');
  document.getElementById('showOnlyNewBtn').classList.remove('active');
  render();
});

document.getElementById('showOnlyNewBtn').addEventListener('click', () => {
  showOnlyNew = true;
  document.getElementById('showOnlyNewBtn').classList.add('active');
  document.getElementById('showAllBtn').classList.remove('active');
  render();
});

elRefreshBtn.addEventListener('click', async () => {
  await refreshAll(true);
});

elCopyFirstBtn.addEventListener('click', async (e) => {
  const firstNew = orders.find(o => o.status === 'new');
  if(!firstNew){
    alert('Новых заказов нет');
    return;
  }

  await copyOrder(firstNew, e.currentTarget);
});

document.getElementById('checkPushBtn').addEventListener('click', async () => {
  await loadPushStats();
  setPushResult('Статистика push обновлена');
});

document.getElementById('pricePushBtn').addEventListener('click', () => {
  document.getElementById('pushTitle').value = 'Сладкая планета';
  document.getElementById('pushBody').value = 'Цены обновлены, можно оформлять заказ';
  document.getElementById('pushUrl').value = '/';
  setPushResult('Шаблон "Обновление прайса" подставлен');
});

document.getElementById('testPushBtn').addEventListener('click', async () => {
  try{
    const payload = getPushPayload();

    if(!payload.body){
      alert('Заполни текст уведомления');
      return;
    }

    const data = await sendPush(payload);
    await loadPushStats();

    setPushResult(`Отправлено: ${data.sent ?? 0}, ошибок: ${data.failed ?? 0}, удалено: ${data.removed ?? 0}`);
  }catch(e){
    setPushResult(e.message || 'Ошибка push', true);
  }
});

document.getElementById('sendPushBtn').addEventListener('click', async () => {
  try{
    const payload = getPushPayload();

    if(!payload.body){
      alert('Заполни текст уведомления');
      return;
    }

    const ok = confirm('Отправить push всем подписчикам?');
    if(!ok) return;

    const data = await sendPush(payload);
    await loadPushStats();

    setPushResult(`Push отправлен. Всего: ${data.total ?? 0}, доставлено: ${data.sent ?? 0}, ошибок: ${data.failed ?? 0}, удалено: ${data.removed ?? 0}`);
  }catch(e){
    setPushResult(e.message || 'Ошибка push', true);
  }
});

elOrders.addEventListener('click', async (e) => {
  const copyBtn = e.target.closest('[data-copy]');
  const pushBtn = e.target.closest('[data-push]');
  const doneBtn = e.target.closest('[data-done]');
  const cancelBtn = e.target.closest('[data-cancel]');

  if(copyBtn){
    const id = Number(copyBtn.dataset.copy);
    const order = orders.find(o => Number(o.id) === id);
    if(order) await copyOrder(order, copyBtn);
    return;
  }

  if(pushBtn){
    const id = Number(pushBtn.dataset.push);
    const order = orders.find(o => Number(o.id) === id);
    if(order) await sendPushForOrder(order);
    return;
  }

  if(doneBtn){
    const id = Number(doneBtn.dataset.done);
    const btn = doneBtn;
    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Сохраняю...';

    try{
      await patchStatus(id, 'done');
      render();
      showNotice(`Заказ #${id} отмечен как обработан`);
    }catch(e){
      alert(e.message || 'Не удалось изменить статус');
    }finally{
      btn.disabled = false;
      btn.textContent = old;
    }
    return;
  }

  if(cancelBtn){
    const id = Number(cancelBtn.dataset.cancel);
    const btn = cancelBtn;
    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Сохраняю...';

    try{
      await patchStatus(id, 'cancelled');
      render();
      showNotice(`Заказ #${id} отменён`);
    }catch(e){
      alert(e.message || 'Не удалось изменить статус');
    }finally{
      btn.disabled = false;
      btn.textContent = old;
    }
  }
});

async function init(){
  await refreshAll(true);

  setInterval(async () => {
    await refreshAll(false);
  }, 3000);
}

init();
</script>
</body>
