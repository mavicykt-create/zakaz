<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Заказы — Сладкая планета</title>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --ink:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --yellow:#d97706;
  --yellow-bg:#fff7ed;
  --green-bg:#ecfdf5;
  --red-bg:#fef2f2;
  --shadow:0 10px 30px rgba(17,24,39,.07);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--ink);
}

.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:16px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.top-left{
  display:flex;
  flex-direction:column;
  gap:6px;
}

h1{
  margin:0;
  font-size:28px;
  line-height:1;
}

.sub{
  color:var(--muted);
  font-size:14px;
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  min-height:44px;
  padding:10px 14px;
  border-radius:12px;
  border:0;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
}

.btn.dark{ background:#111827; color:#fff; }
.btn.blue{ background:var(--blue); color:#fff; }
.btn.green{ background:var(--green); color:#fff; }
.btn.red{ background:var(--red); color:#fff; }
.btn.gray{ background:#e5e7eb; color:#111827; }

.search{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-size:15px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:var(--card);
  border-radius:16px;
  padding:14px 16px;
  box-shadow:var(--shadow);
}

.stat-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.stat-value{
  font-size:28px;
  font-weight:800;
  line-height:1;
}

.notice{
  display:none;
  margin-bottom:16px;
  padding:14px 16px;
  border-radius:14px;
  background:var(--green-bg);
  color:#166534;
  font-weight:700;
  box-shadow:var(--shadow);
}

.orders{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.order{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  box-shadow:var(--shadow);
  border-left:6px solid #d1d5db;
}

.order.new{
  border-left-color:var(--yellow);
}

.order.done{
  border-left-color:var(--green);
  opacity:.92;
}

.order.cancelled{
  border-left-color:var(--red);
  opacity:.82;
}

.head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.head-left{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.id{
  font-size:22px;
  font-weight:800;
  line-height:1;
}

.time{
  font-size:13px;
  color:var(--muted);
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.badge.new{
  background:var(--yellow-bg);
  color:#9a3412;
}

.badge.done{
  background:var(--green-bg);
  color:#166534;
}

.badge.cancelled{
  background:var(--red-bg);
  color:#b91c1c;
}

.badge.sum{
  background:#eff6ff;
  color:#1d4ed8;
}

.comment{
  margin-bottom:12px;
  padding:12px 14px;
  border-radius:14px;
  background:#f9fafb;
  border:1px solid var(--line);
  font-size:14px;
}

.comment.empty{
  color:var(--muted);
}

.items{
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.row{
  display:grid;
  grid-template-columns:1.2fr .7fr .8fr .8fr;
  gap:12px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  align-items:center;
}

.row:last-child{
  border-bottom:none;
}

.row.headline{
  background:#111827;
  color:#fff;
  font-size:13px;
  font-weight:700;
}

.article{
  font-weight:800;
  font-size:18px;
}

.qty,
.price,
.line-sum{
  font-weight:700;
}

.actions{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:40px 20px;
  background:#fff;
  border-radius:18px;
  box-shadow:var(--shadow);
}

@media (max-width:900px){
  .stats{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .row{
    grid-template-columns:1fr .7fr;
  }

  .row.headline .price,
  .row.headline .line-sum,
  .row .price,
  .row .line-sum{
    display:none;
  }
}

@media (max-width:560px){
  .stats{
    grid-template-columns:1fr 1fr;
  }

  .id{
    font-size:20px;
  }

  .article{
    font-size:16px;
  }

  .btn{
    width:100%;
  }

  .top-actions{
    width:100%;
  }

  .top-actions .btn{
    flex:1 1 100%;
  }

  .actions .btn{
    flex:1 1 100%;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-left">
      <h1>Заказы</h1>
      <div class="sub">Новые сверху. Обновление каждые 3 секунды.</div>
    </div>

    <div class="top-actions">
      <button class="btn dark" id="refreshBtn">Обновить</button>
      <button class="btn blue" id="copyFirstBtn">Копировать первый новый</button>
    </div>
  </div>

  <div id="notice" class="notice">Поступил новый заказ</div>

  <input class="search" id="search" placeholder="Поиск по ID, артикулу, комментарию..." />

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Всего</div>
      <div class="stat-value" id="statAll">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Новые</div>
      <div class="stat-value" id="statNew">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Обработаны</div>
      <div class="stat-value" id="statDone">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Последнее обновление</div>
      <div class="stat-value" id="statTime" style="font-size:18px;">—</div>
    </div>
  </div>

  <div id="orders" class="orders"></div>
</div>

<script>
let orders = [];
let products = {};
let lastTopOrderId = null;
let audioUnlocked = false;

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function formatMoney(value){
  return Number(value || 0).toLocaleString('ru-RU') + ' ₽';
}

function formatDate(value){
  try{
    return new Date(value).toLocaleString('ru-RU');
  }catch{
    return value || '—';
  }
}

function unlockAudio(){
  audioUnlocked = true;
}

function beepNewOrder(){
  if(!audioUnlocked) return;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;

    const o1 = ctx.createOscillator();
    const g1 = ctx.createGain();
    o1.type = 'sine';
    o1.frequency.value = 880;
    g1.gain.setValueAtTime(0.0001, now);
    g1.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
    g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    o1.connect(g1);
    g1.connect(ctx.destination);
    o1.start(now);
    o1.stop(now + 0.16);

    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.value = 1175;
    g2.gain.setValueAtTime(0.0001, now + 0.10);
    g2.gain.exponentialRampToValueAtTime(0.07, now + 0.12);
    g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);
    o2.connect(g2);
    g2.connect(ctx.destination);
    o2.start(now + 0.10);
    o2.stop(now + 0.26);
  }catch(e){}
}

async function loadProducts(){
  try{
    const res = await fetch('/api/products', { cache:'no-store' });
    products = await res.json();
  }catch(e){
    products = {};
  }
}

function calcOrderSum(order){
  let s = 0;
  (order.items || []).forEach(i => {
    const price = Number(products[i.article]?.price || 0);
    s += price * Number(i.quantity || 0);
  });
  return s;
}

function sortOrders(list){
  return [...list].sort((a, b) => {
    const rank = status => {
      if (status === 'new') return 0;
      if (status === 'done') return 1;
      if (status === 'cancelled') return 2;
      return 3;
    };

    const r = rank(a.status) - rank(b.status);
    if (r !== 0) return r;

    return new Date(b.createdAt) - new Date(a.createdAt);
  });
}

async function loadOrders(){
  const res = await fetch('/api/orders', { cache:'no-store' });
  const data = await res.json();
  const nextOrders = Array.isArray(data.orders) ? data.orders : [];
  const sortedNext = sortOrders(nextOrders);

  if (sortedNext.length > 0) {
    const newTopId = sortedNext[0].id;
    if (lastTopOrderId !== null && newTopId !== lastTopOrderId) {
      showNotice('Поступил новый заказ');
      beepNewOrder();
    }
    lastTopOrderId = newTopId;
  }

  orders = sortedNext;
  render();
}

function showNotice(text){
  const el = document.getElementById('notice');
  el.textContent = text;
  el.style.display = 'block';

  clearTimeout(showNotice._t);
  showNotice._t = setTimeout(() => {
    el.style.display = 'none';
  }, 2500);
}

function getStatusText(status){
  if(status === 'done') return 'Обработан';
  if(status === 'cancelled') return 'Отменён';
  return 'Новый';
}

function getOrderExcelText(order){
  return (order.items || []).map(i => `${i.article}\t${i.quantity}`).join('\n');
}

async function copyOrder(order, button){
  try{
    await navigator.clipboard.writeText(getOrderExcelText(order));
    const old = button.textContent;
    button.textContent = 'Скопировано';
    button.classList.remove('blue');
    button.classList.add('green');

    setTimeout(() => {
      button.textContent = old;
      button.classList.remove('green');
      button.classList.add('blue');
    }, 1200);
  }catch(e){
    alert('Не удалось скопировать');
  }
}

async function patchStatus(orderId, status){
  const res = await fetch('/api/orders/' + orderId + '/status', {
    method:'PATCH',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({ status })
  });

  const data = await res.json().catch(() => ({}));

  if(!res.ok || !data.success){
    alert(data.error || 'Не удалось изменить статус');
    return false;
  }

  return true;
}

async function sendPushForOrder(order){
  const body = `Новый заказ #${order.id}. Позиций: ${order.totalQuantity || 0}. Сумма: ${formatMoney(calcOrderSum(order))}`;

  const res = await fetch('/api/push/send', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({
      title:'Сладкая планета',
      body,
      url:'/'
    })
  });

  const data = await res.json().catch(() => ({}));

  if(!res.ok || !data.success){
    alert(data.error || 'Не удалось отправить push');
    return;
  }

  showNotice(`Push отправлен: ${data.sent || 0}`);
}

function render(){
  const root = document.getElementById('orders');
  const q = document.getElementById('search').value.trim().toLowerCase();

  const filtered = orders.filter(o => {
    const haystack = [
      o.id,
      o.comment,
      o.customerName,
      o.customerPhone,
      o.rawText,
      ...(o.items || []).map(i => i.article)
    ].join(' ').toLowerCase();

    return !q || haystack.includes(q);
  });

  document.getElementById('statAll').textContent = orders.length;
  document.getElementById('statNew').textContent = orders.filter(o => o.status === 'new').length;
  document.getElementById('statDone').textContent = orders.filter(o => o.status === 'done').length;
  document.getElementById('statTime').textContent = new Date().toLocaleTimeString('ru-RU');

  if(!filtered.length){
    root.innerHTML = '<div class="empty">Нет заказов</div>';
    return;
  }

  root.innerHTML = '';

  filtered.forEach(order => {
    const orderSum = calcOrderSum(order);

    const div = document.createElement('div');
    div.className = 'order ' + (order.status || 'new');

    div.innerHTML = `
      <div class="head">
        <div class="head-left">
          <div class="id">#${escapeHtml(order.id)}</div>
          <div class="time">${escapeHtml(formatDate(order.createdAt))}</div>
        </div>

        <div class="badges">
          <div class="badge ${(order.status || 'new')}">${escapeHtml(getStatusText(order.status))}</div>
          <div class="badge sum">${escapeHtml(formatMoney(orderSum))}</div>
        </div>
      </div>

      <div class="comment ${order.comment ? '' : 'empty'}">
        ${order.comment ? escapeHtml(order.comment) : 'Без комментария'}
      </div>

      <div class="items">
        <div class="row headline">
          <div>Артикул</div>
          <div>Количество</div>
          <div class="price">Цена</div>
          <div class="line-sum">Сумма</div>
        </div>

        ${(order.items || []).map(item => {
          const price = Number(products[item.article]?.price || 0);
          const lineSum = price * Number(item.quantity || 0);

          return `
            <div class="row">
              <div class="article">${escapeHtml(item.article)}</div>
              <div class="qty">${escapeHtml(item.quantity)}</div>
              <div class="price">${escapeHtml(formatMoney(price))}</div>
              <div class="line-sum">${escapeHtml(formatMoney(lineSum))}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="actions">
        <button class="btn blue" data-copy="${order.id}">Копировать</button>
        ${order.status === 'new' ? `<button class="btn dark" data-push="${order.id}">Push</button>` : ''}
        ${order.status !== 'done' ? `<button class="btn green" data-done="${order.id}">Готово</button>` : ''}
        ${order.status !== 'cancelled' ? `<button class="btn red" data-cancel="${order.id}">Отмена</button>` : ''}
      </div>
    `;

    root.appendChild(div);
  });
}

document.addEventListener('click', unlockAudio, { once:true });
document.addEventListener('keydown', unlockAudio, { once:true });

document.getElementById('search').addEventListener('input', render);

document.getElementById('refreshBtn').addEventListener('click', async () => {
  await loadProducts();
  await loadOrders();
});

document.getElementById('copyFirstBtn').addEventListener('click', async (e) => {
  const firstNew = orders.find(o => o.status === 'new');
  if(!firstNew){
    alert('Новых заказов нет');
    return;
  }

  await copyOrder(firstNew, e.currentTarget);
});

document.getElementById('orders').addEventListener('click', async (e) => {
  const copyBtn = e.target.closest('[data-copy]');
  const pushBtn = e.target.closest('[data-push]');
  const doneBtn = e.target.closest('[data-done]');
  const cancelBtn = e.target.closest('[data-cancel]');

  if(copyBtn){
    const id = Number(copyBtn.dataset.copy);
    const order = orders.find(o => Number(o.id) === id);
    if(order) await copyOrder(order, copyBtn);
  }

  if(pushBtn){
    const id = Number(pushBtn.dataset.push);
    const order = orders.find(o => Number(o.id) === id);
    if(order) await sendPushForOrder(order);
  }

  if(doneBtn){
    const id = Number(doneBtn.dataset.done);
    const ok = await patchStatus(id, 'done');
    if(ok) await loadOrders();
  }

  if(cancelBtn){
    const id = Number(cancelBtn.dataset.cancel);
    const ok = await patchStatus(id, 'cancelled');
    if(ok) await loadOrders();
  }
});

async function init(){
  await loadProducts();
  await loadOrders();

  setInterval(async () => {
    await loadProducts();
    await loadOrders();
  }, 3000);
}

init();
</script>
</body>
</html>
